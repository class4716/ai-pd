            return { correct, total };
        }

        function updateScore() {
            const { correct, total } = calcScore();
            scoreDisplay.textContent = `${correct} / ${total}`;
        }

        // 交卷
        function handleSubmit() {
            if (!currentUser || !currentQuestions.length) {
                alert('请先生成试卷。');
                return;
            }
            if (submitted) {
                alert('已经交卷，请点击「重置」重新测试。');
                return;
            }
            // 检查是否所有题目都已作答
            const allAnswered = currentQuestions.every(q => userAnswers[q.id] !== undefined && userAnswers[q.id] !== null);
            if (!allAnswered) {
                const confirmSubmit = confirm('还有题目未作答，确定交卷吗？');
                if (!confirmSubmit) return;
            }
            submitted = true;
            // 更新错题本
            const wrongIds = [];
            currentQuestions.forEach(q => {
                const selected = userAnswers[q.id];
                if (selected !== undefined && selected !== null) {
                    const isCorrect = (selected === 'true') === q.answer;
                    if (!isCorrect) {
                        wrongIds.push(q.id);
                    }
                } else {
                    // 未作答视为错误
                    wrongIds.push(q.id);
                }
            });
            // 去重后加入错题本
            wrongIds.forEach(id => {
                if (!wrongBook.includes(id)) wrongBook.push(id);
            });
            saveWrongBook();

            renderQuestions();
            updateScore();
            statusInfo.textContent = '已交卷，错题已记录';
        }

        // 显示错题本 (加载错题)
        function showWrongQuestions() {
            if (!currentUser) return;
            if (!wrongBook.length) {
                alert('错题本为空，继续加油！');
                return;
            }
            // 从题库中取错题
            const wrongQ = rawQuestions.filter(q => wrongBook.includes(q.id));
            if (!wrongQ.length) {
                alert('错题本为空 (可能题目已变更)');
                return;
            }
            // 替换当前试卷为错题
            currentQuestions = wrongQ;
            userAnswers = {};
            submitted = false;
            renderQuestions();
            updateScore();
            statusInfo.textContent = `错题本 (${wrongQ.length} 题)`;
        }

        // 清空错题本
        function clearWrongBook() {
            if (confirm('确定清空错题本吗？')) {
                wrongBook = [];
                saveWrongBook();
                alert('错题本已清空');
                statusInfo.textContent = '错题本已清空';
                // 如果当前显示的是错题，重置为空白
                if (currentQuestions.length && currentQuestions.every(q => wrongBook.includes(q.id))) {
                    resetExamState();
                }
            }
        }

        // 重置 (清空试卷和答案)
        function handleReset() {
            if (!currentUser) return;
            resetExamState();
            generateBtn.click(); // 重新生成一份
        }

        // ----- 登录逻辑 -----
        function doLogin() {
            const user = usernameInput.value.trim();
            const pass = passwordInput.value.trim();
            if (user === 'user' && pass === 'user_123456') {
                currentUser = user;
                loginArea.style.display = 'none';
                testArea.classList.remove('hidden');
                userDisplay.textContent = `👤 ${user}`;
                loginError.textContent = '';
                // 加载错题本
                loadWrongBook();
                // 初始化试卷
                resetExamState();
                generatePaper(parseInt(questionCountInput.value) || 10);
            } else {
                loginError.textContent = '❌ 用户名或密码错误';
            }
        }

        function doLogout() {
            currentUser = null;
            loginArea.style.display = 'block';
            testArea.classList.add('hidden');
            userDisplay.textContent = '未登录';
            resetExamState();
            localStorage.removeItem(STORAGE_KEY); // 登出时清除错题本（可选）
            wrongBook = [];
        }

        // ----- 事件绑定 -----
        loginBtn.addEventListener('click', doLogin);
        logoutBtn.addEventListener('click', doLogout);
        // 回车登录
        passwordInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') doLogin(); });
        usernameInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') doLogin(); });

        generateBtn.addEventListener('click', function() {
            if (!currentUser) return;
            const count = parseInt(questionCountInput.value) || 10;
            generatePaper(count);
        });

        resetBtn.addEventListener('click', handleReset);

        submitBtn.addEventListener('click', handleSubmit);

        showWrongBtn.addEventListener('click', showWrongQuestions);

        clearWrongBtn.addEventListener('click', clearWrongBook);

        // 初始化：确保登录状态
        // 默认显示登录界面
        loginArea.style.display = 'block';
        testArea.classList.add('hidden');
        // 预填账号
        usernameInput.value = '';
        passwordInput.value = '';
        // 自动登录 (方便测试，可注释)
        // doLogin();  // 取消注释可自动登录
        // 加载错题本
        loadWrongBook();
    })();
</script>
</body>
</html>

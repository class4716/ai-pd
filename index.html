<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>判断题刷题系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
        }

        body {
            background: #f1f5f9;
            padding: 24px 16px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 登录遮罩 */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: white;
            border-radius: 48px;
            padding: 36px 32px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 24px;
            color: #1e293b;
        }

        .login-input {
            width: 100%;
            padding: 14px 18px;
            margin: 12px 0;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            font-size: 1rem;
            transition: 0.2s;
        }

        .login-input:focus {
            outline: none;
            border-color: #2c3e66;
        }

        .login-btn {
            background: #2c3e66;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 16px;
            cursor: pointer;
        }

        .error-msg {
            color: #e11d48;
            font-size: 0.85rem;
            margin-top: 12px;
        }

        .role-demo {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #64748b;
            background: #f8fafc;
            padding: 12px;
            border-radius: 20px;
            text-align: left;
        }

        .role-demo p {
            margin: 6px 0;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 60px;
            padding: 8px 20px;
            margin-bottom: 24px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .user-badge {
            background: #eef2ff;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-weight: 500;
            cursor: pointer;
            margin-left: 12px;
        }

        .mode-bar {
            display: flex;
            gap: 12px;
            background: white;
            padding: 8px 16px;
            border-radius: 60px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            margin-bottom: 24px;
            justify-content: center;
        }

        .mode-btn {
            border: none;
            background: transparent;
            padding: 10px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            color: #334155;
        }

        .mode-btn.active {
            background: #2c3e66;
            color: white;
        }

        .card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 24px -12px rgba(0,0,0,0.15);
            padding: 28px 24px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            border-bottom: 2px solid #eef2ff;
            padding-bottom: 12px;
        }

        .q-num {
            font-size: 1.3rem;
            font-weight: 700;
            background: #eef2ff;
            padding: 4px 14px;
            border-radius: 40px;
        }

        .wrong-status {
            font-size: 0.8rem;
            background: #fee2e2;
            color: #b91c1c;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .question-text {
            font-size: 1.45rem;
            font-weight: 500;
            line-height: 1.4;
            margin: 20px 0 28px;
        }

        .action-buttons {
            display: flex;
            gap: 16px;
            margin: 20px 0 24px;
            flex-wrap: wrap;
        }

        .btn-option {
            flex: 1;
            padding: 14px 0;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            background: #f8fafc;
            border: 1.5px solid #cbd5e1;
            transition: all 0.2s;
        }
        .btn-option.correct-btn:hover { background: #dcfce7; border-color: #22c55e; }
        .btn-option.wrong-btn:hover { background: #fee2e2; border-color: #ef4444; }

        .result-area {
            margin-top: 20px;
            background: #f8fafc;
            border-radius: 20px;
            padding: 18px;
            border-left: 5px solid #64748b;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 28px;
            gap: 12px;
        }

        .nav-btn {
            background: #eef2ff;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .nav-btn.primary { background: #2c3e66; color: white; }

        .wrong-list-container {
            max-height: 65vh;
            overflow-y: auto;
        }
        .wrong-item {
            background: #fef9f0;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid #ffe4c4;
        }
        .wrong-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 12px;
        }
        .small-btn {
            padding: 6px 16px;
            border-radius: 30px;
            border: none;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            background: #e2e8f0;
        }
        .small-btn.primary { background: #2c3e66; color: white; }
        .small-btn.danger { background: #ffedd5; color: #b45309; }

        .admin-panel {
            margin-top: 28px;
            border-top: 2px dashed #cbd5e1;
            padding-top: 24px;
        }
        .admin-section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .question-editor {
            background: #f1f5f9;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .editor-field {
            margin-bottom: 14px;
        }
        .editor-field label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }
        .editor-field input, .editor-field textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            font-size: 0.9rem;
        }
        .correct-select {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .save-edit-btn {
            background: #2c3e66;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .danger-btn {
            background: #fee2e2;
            color: #b91c1c;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .icon-btn {
            background: white;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .empty-tip { text-align: center; color: #64748b; padding: 40px; }
        @media (max-width: 550px) { .question-text { font-size: 1.2rem; } }
        .role-tag {
            display: inline-block;
            background: #e6f7ec;
            color: #2b6e3c;
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 30px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ---------- 完整题库 (33道题，基于原文档) ----------
    const FULL_QUESTION_BANK = [
        { id: "902", text: "在关联分析中，支持度是用于评估变量间关联程度的指标。", correctAnswer: false, explanation: "支持度评估普遍性，置信度/提升度评估关联程度。" },
        { id: "903", text: "遵章守法的基本要求涵盖：遵守法律法规、遵循道德规范、不参与非法活动、滥用职权、保护客户权益。", correctAnswer: false, explanation: "遵章守法不包含\"滥用职权\"，而是反对滥用职权。" },
        { id: "907", text: "数据库管理系统只负责数据的存储，而数据的增删改查操作则完全依靠外部应用程序来实现。", correctAnswer: false, explanation: "DBMS提供数据操纵功能（DML）。" },
        { id: "908", text: "劳动者若拒绝用人单位管理人员的违章指挥、强令冒险作业，会被视作违反劳动合同。", correctAnswer: false, explanation: "拒绝违章指挥是劳动者合法权利。" },
        { id: "910", text: "在请求模式里，当应用程序等待输入数据时，并不会暂停自身的执行流程，它会持续运行，直到接收到输入数据才会停下。", correctAnswer: false, explanation: "请求模式下程序会阻塞等待。" },
        { id: "911", text: "依据文件的保护时长，可将文件分为临时文件和永久文件两类。", correctAnswer: false, explanation: "文件分类通常按用途或格式，非保护时长。" },
        { id: "916", text: "Jieba分词库仅能用于情感分析。", correctAnswer: false, explanation: "jieba是通用中文分词工具。" },
        { id: "917", text: "面对复杂的业务需求以及日益增多的ETL任务列表，调度的基础逻辑无需添加额外策略。", correctAnswer: false, explanation: "需要优先级、依赖等调度策略。" },
        { id: "921", text: "GOMS作为一种人机交互界面表示的理论模型，将所有任务都视为面向操作目标的，但它能够解决的问题本质以及用户间的个体差异存在局限。", correctAnswer: false, explanation: "GOMS不擅长处理个体差异和复杂决策。" },
        { id: "923", text: "业务流程重组（BPR）属于渐进式改进方法，其主要做法是对现有流程进行小范围调整，以此提升企业性能。", correctAnswer: false, explanation: "BPR是彻底、根本性的再造。" },
        { id: "930", text: "中文分词模型的主要功能是将连贯的汉字序列拆分成单个的汉字。", correctAnswer: false, explanation: "是拆分为有意义的词语。" },
        { id: "932", text: "均值滤波能用于去除脉冲噪声。", correctAnswer: false, explanation: "中值滤波更适合脉冲噪声（椒盐噪声）。" },
        { id: "936", text: "对比分析作为一种数据分析方法，其用意是找出不同数据集或数据点之间的相同之处。", correctAnswer: false, explanation: "对比分析重在找差异。" },
        { id: "937", text: "在Word中插入目录时，先把光标移到想要插入目录的位置，再在菜单栏的\"工具栏\"选项卡中选择合适的样式，Word就会生成包含章节标题和页码的目录。", correctAnswer: false, explanation: "目录在\"引用\"选项卡下。" },
        { id: "941", text: "仅依据测试误差，就能判断算法是否存在欠拟合。", correctAnswer: false, explanation: "需要同时看训练误差和测试误差。" },
        { id: "943", text: "自动语言识别领域中，最常用的两种语音处理方法是梅尔滤波器组和布尔频率系数。", correctAnswer: false, explanation: "是梅尔频率倒谱系数（MFCC）。" },
        { id: "945", text: "可用性是指产品是否能够引起用户的关注，并且让用户产生使用它的念头。", correctAnswer: false, explanation: "可用性关注有效性、效率、满意度等。" },
        { id: "947", text: "无监督图像去噪方法只利用噪声图像来开展训练。", correctAnswer: false, explanation: "通常需要干净图像作为目标。" },
        { id: "950", text: "ETL数据整合工具是一种硬件，用于把数据从源系统中提取出来，经过转换后加载到目标系统。", correctAnswer: false, explanation: "ETL工具是软件。" },
        { id: "956", text: "业务流程重组（BPR）的目标是借助渐进式改进来完善现有的业务流程。", correctAnswer: false, explanation: "BPR是彻底的再造。" },
        { id: "966", text: "业务数据主要流程的开端是数据分析与建模，它的功能是直接为数据获取工作提供指引。", correctAnswer: false, explanation: "开端是需求分析。" },
        { id: "968", text: "图像数据处理是利用图像去噪、图形美化、图像数据减弱等手段，根据需求对图像数据进行处理的技术。", correctAnswer: false, explanation: "图像数据处理涵盖增强、分割、识别等，描述不全面或有误导。" },
        { id: "969", text: "某旅游公司打算分析游客的消费状况，仅依据旅游消费金额这一维度进行分类，为消费金额高的游客提供豪华游服务，这种做法被认为是对象限分析法的合理运用。", correctAnswer: false, explanation: "单维度分类不是象限分析法。" },
        { id: "974", text: "NoSQL数据库完全不支持ACID事务。", correctAnswer: false, explanation: "部分NoSQL支持单行/文档级ACID。" },
        { id: "976", text: "运用支持向量机算法时，距离超平面越近的点，越容易被正确分类。", correctAnswer: false, explanation: "距离越远置信度越高。" },
        { id: "977", text: "操作系统是对软件的抽象，用户借助操作系统来操控计算机。", correctAnswer: false, explanation: "操作系统是对硬件的抽象。" },
        { id: "978", text: "以用户为中心的设计，只需看重用户的感受和体验，不必在意效率问题。", correctAnswer: false, explanation: "用户为中心的设计同时关注用户体验和效率，二者都重要。" },
        { id: "983", text: "企业进行业务流程优化时，无需参考国内外成功企业的管理经验，只需根据自身情况就能完成优化。", correctAnswer: false, explanation: "应结合自身情况并借鉴成功经验，闭门造车不可取。" },
        { id: "988", text: "运用计算机视觉、人脸识别、区块链、web3.0、物联网等新技术打造的新型无人零售店，实现了\"拿了就走\"等自助支付模式。", correctAnswer: false, explanation: "无人零售核心技术通常不包括区块链和web3.0。" },
        { id: "992", text: "数据标注流程包含数据采集、数据清洗、数据标注、数据提示这几个环节。", correctAnswer: false, explanation: "包含数据质检，非\"数据提示\"。" },
        { id: "996", text: "在经营活动中，若要条理清晰地表达信息，就需要按照SWOT法来组织语言。", correctAnswer: false, explanation: "SWOT用于战略分析，非语言组织方法。" },
        { id: "999", text: "在数据清洗工作里，处理缺失值是唯一需要攻克的难题。", correctAnswer: false, explanation: "还有异常值、重复值、不一致等。" },
        { id: "1000", text: "利用jieba分词库进行情感分析时，无需对原始文本数据做预处理。", correctAnswer: false, explanation: "情感分析前需要分词、去停用词等预处理。" }
    ];

    // 存储Keys (区分角色存储，但普通用户和管理员共用同一套题库? 一般管理员修改题库影响所有人，更符合实际)
    const STORAGE_QUESTIONS = "dual_role_question_bank";
    const STORAGE_WRONG_SET = "wrong_set_common";   // 错题本独立存储（每个账号错题分开, 用role+username标记）
    const STORAGE_PROGRESS = "progress_common";
    
    let questionBank = [];
    let wrongSet = new Set();
    let currentIndex = 0;
    let currentMode = "quiz";
    let currentUser = null;      // { username, role }
    let editingQuestionId = null;

    const appRoot = document.getElementById('app');

    // 获取当前用户的存储key后缀
    function getUserStorageSuffix() {
        if (!currentUser) return "guest";
        return `${currentUser.username}_${currentUser.role}`;
    }
    
    function saveWrongSet() {
        if (!currentUser) return;
        const key = `${STORAGE_WRONG_SET}_${getUserStorageSuffix()}`;
        localStorage.setItem(key, JSON.stringify(Array.from(wrongSet)));
    }
    
    function loadWrongSet() {
        if (!currentUser) return;
        const key = `${STORAGE_WRONG_SET}_${getUserStorageSuffix()}`;
        const raw = localStorage.getItem(key);
        if (raw) {
            try {
                const arr = JSON.parse(raw);
                wrongSet = new Set(arr);
            } catch(e) { wrongSet = new Set(); }
        } else { wrongSet = new Set(); }
        // 过滤无效id
        const validIds = new Set(questionBank.map(q => q.id));
        for (let w of wrongSet) if (!validIds.has(w)) wrongSet.delete(w);
        saveWrongSet();
    }
    
    function saveProgress() {
        if (!currentUser) return;
        const key = `${STORAGE_PROGRESS}_${getUserStorageSuffix()}`;
        localStorage.setItem(key, currentIndex.toString());
    }
    
    function loadProgress() {
        if (!currentUser) return;
        const key = `${STORAGE_PROGRESS}_${getUserStorageSuffix()}`;
        const idx = localStorage.getItem(key);
        if (idx !== null) {
            let i = parseInt(idx, 10);
            if (!isNaN(i) && i >= 0 && i < questionBank.length) currentIndex = i;
            else currentIndex = 0;
        } else { currentIndex = 0; }
        if (currentIndex >= questionBank.length) currentIndex = 0;
        saveProgress();
    }

    function saveQuestionsToLocal() {
        localStorage.setItem(STORAGE_QUESTIONS, JSON.stringify(questionBank));
    }

    function loadQuestionsFromLocal() {
        const stored = localStorage.getItem(STORAGE_QUESTIONS);
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                if (Array.isArray(parsed) && parsed.length === FULL_QUESTION_BANK.length) {
                    questionBank = parsed;
                    return;
                }
            } catch(e) {}
        }
        questionBank = JSON.parse(JSON.stringify(FULL_QUESTION_BANK));
        saveQuestionsToLocal();
    }

    // 错题操作
    function addToWrongSet(qid) {
        if (!wrongSet.has(qid)) {
            wrongSet.add(qid);
            saveWrongSet();
            refreshWrongFlagUI(qid, true);
        }
    }
    function removeFromWrongSet(qid) {
        if (wrongSet.has(qid)) {
            wrongSet.delete(qid);
            saveWrongSet();
            refreshWrongFlagUI(qid, false);
        }
    }
    function refreshWrongFlagUI(qid, isNowWrong) {
        if (currentMode === 'quiz') {
            const cur = getCurrentQuestion();
            if (cur && cur.id === qid) {
                const flagSpan = document.querySelector('.wrong-status');
                if (flagSpan) {
                    if (isNowWrong) {
                        flagSpan.style.display = 'inline-block';
                        flagSpan.innerText = '⚠️ 已在错题本';
                    } else {
                        flagSpan.style.display = 'none';
                    }
                } else { renderMainContent(); }
            } else if (currentMode === 'wrong') { renderMainContent(); }
        } else if (currentMode === 'wrong') { renderMainContent(); }
    }
    function clearAllWrong() {
        if (confirm('清空所有错题记录？')) {
            wrongSet.clear();
            saveWrongSet();
            renderMainContent();
        }
    }

    // 管理员专用: 重置题库等
    function resetAllData() {
        if (!currentUser || currentUser.role !== 'admin') return;
        if (confirm('重置全部数据：恢复33道原始题目，清除所有用户的错题和进度？不可撤销！')) {
            questionBank = JSON.parse(JSON.stringify(FULL_QUESTION_BANK));
            saveQuestionsToLocal();
            // 注意: 不清除其他用户错题，但重置题库后所有用户错题ID可能失效，这里仅清除当前用户的错题本更安全
            wrongSet.clear();
            saveWrongSet();
            currentIndex = 0;
            saveProgress();
            editingQuestionId = null;
            renderMainContent();
            alert('已恢复完整33道题库，当前用户的错题和进度已重置');
        }
    }
    
    function addNewQuestion() {
        if (!currentUser || currentUser.role !== 'admin') return;
        let newId = prompt("请输入新题号 (唯一，例如 2001):");
        if (!newId) return;
        if (questionBank.some(q => q.id === newId)) { alert("题号已存在"); return; }
        let newText = prompt("请输入题目内容:");
        if (!newText) return;
        let isCorrectRaw = confirm("本题正确答案是“正确”吗？\n确定=正确，取消=错误");
        let newExplanation = prompt("请输入解析:") || "暂无解析";
        questionBank.push({
            id: newId,
            text: newText,
            correctAnswer: isCorrectRaw,
            explanation: newExplanation
        });
        saveQuestionsToLocal();
        renderMainContent();
    }
    
    function deleteQuestion(qid) {
        if (!currentUser || currentUser.role !== 'admin') return;
        if (questionBank.length <= 1) { alert("至少保留一道题目"); return; }
        if (confirm(`永久删除题号 ${qid} 吗？`)) {
            const idx = questionBank.findIndex(q => q.id === qid);
            if (idx !== -1) {
                questionBank.splice(idx, 1);
                if (wrongSet.has(qid)) wrongSet.delete(qid);
                if (currentIndex >= questionBank.length) currentIndex = questionBank.length - 1;
                if (currentIndex < 0) currentIndex = 0;
                saveQuestionsToLocal();
                saveWrongSet();
                saveProgress();
                renderMainContent();
            }
        }
    }
    
    function saveQuestionEdit(editedId, newText, newCorrectAnswerBool, newExplanation) {
        if (!currentUser || currentUser.role !== 'admin') return;
        const idx = questionBank.findIndex(q => q.id === editedId);
        if (idx !== -1) {
            questionBank[idx].text = newText;
            questionBank[idx].correctAnswer = newCorrectAnswerBool;
            questionBank[idx].explanation = newExplanation;
            saveQuestionsToLocal();
            renderMainContent();
            editingQuestionId = null;
        }
    }
    
    function getCurrentQuestion() {
        if (!questionBank.length) return null;
        return questionBank[currentIndex];
    }
    
    function handleAnswer(selectedIsCorrect) {
        const q = getCurrentQuestion();
        if (!q) return;
        const realAnswer = q.correctAnswer;
        const isUserCorrect = (selectedIsCorrect === realAnswer);
        const panel = document.getElementById('resultPanel');
        const feedbackDiv = document.getElementById('feedbackMsg');
        const explanationDivElem = document.getElementById('explanationText');
        if (panel) panel.style.display = 'block';
        if (feedbackDiv) {
            if (isUserCorrect) {
                feedbackDiv.innerText = '✅ 回答正确！';
                feedbackDiv.className = 'feedback correct-feedback';
            } else {
                feedbackDiv.innerText = `❌ 回答错误！正确答案是：${realAnswer ? '正确' : '错误'}`;
                feedbackDiv.className = 'feedback wrong-feedback';
                addToWrongSet(q.id);
            }
        }
        if (explanationDivElem) explanationDivElem.innerText = `📖 解析：${q.explanation}`;
    }
    
    function renderEditorInline(q) {
        return `
            <div class="question-editor">
                <div class="editor-field">
                    <label>题目文本</label>
                    <textarea id="editText" rows="2">${escapeHtml(q.text)}</textarea>
                </div>
                <div class="editor-field">
                    <label>正确答案</label>
                    <div class="correct-select">
                        <label><input type="radio" name="editCorrect" value="true" ${q.correctAnswer === true ? 'checked' : ''}> 正确</label>
                        <label><input type="radio" name="editCorrect" value="false" ${q.correctAnswer === false ? 'checked' : ''}> 错误</label>
                    </div>
                </div>
                <div class="editor-field">
                    <label>解析</label>
                    <textarea id="editExplanation" rows="2">${escapeHtml(q.explanation)}</textarea>
                </div>
                <div style="display:flex; gap:12px; margin-top:12px;">
                    <button id="saveEditBtn" class="save-edit-btn">💾 保存修改</button>
                    <button id="cancelEditBtn" class="icon-btn">取消</button>
                    <button id="deleteQuestionBtn" class="danger-btn">🗑 删除本题</button>
                </div>
            </div>
        `;
    }
    
    function renderQuizView() {
        const q = getCurrentQuestion();
        if (!q) return `<div class="card">暂无题目，请联系管理员添加</div>`;
        const isInWrong = wrongSet.has(q.id);
        const isAdmin = currentUser?.role === 'admin';
        return `
            <div class="card">
                <div class="extra-toolbar" style="display:flex; justify-content:flex-end; gap:12px; margin-bottom:16px;">
                    <button class="icon-btn" id="removeCurrentWrongBtn" style="background:#fff0f0;">🗑 移出错题本</button>
                </div>
                <div class="question-header">
                    <span class="q-num">题号 ${q.id}</span>
                    ${isInWrong ? '<span class="wrong-status">⚠️ 已在错题本</span>' : ''}
                </div>
                <div class="question-text">${escapeHtml(q.text)}</div>
                <div class="action-buttons">
                    <button class="btn-option correct-btn" id="correctAnswerBtn">✅ 正确</button>
                    <button class="btn-option wrong-btn" id="incorrectAnswerBtn">❌ 错误</button>
                </div>
                <div id="resultPanel" style="display:none;" class="result-area">
                    <div id="feedbackMsg" class="feedback"></div>
                    <div id="explanationText" class="explanation"></div>
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn">◀ 上一题</button>
                    <span>第${currentIndex+1} / ${questionBank.length}题</span>
                    <button class="nav-btn primary" id="nextBtn">下一题 ▶</button>
                </div>
                ${isAdmin ? `
                <div class="admin-panel">
                    <div class="admin-section-title">🛠️ 管理员配置 (可编辑题目)</div>
                    <div class="flex-between" style="margin-bottom:12px;">
                        <button id="editCurrentQuestionBtn" class="icon-btn" style="background:#e6f0ff;">✏️ 编辑本题</button>
                        <button id="addQuestionBtn" class="icon-btn" style="background:#e6f7ec;">➕ 新增题目</button>
                        <button id="resetAllDataBtn" class="danger-btn">重置题库(仅管理员)</button>
                    </div>
                    ${editingQuestionId === q.id ? renderEditorInline(q) : ''}
                </div>
                ` : ''}
            </div>
        `;
    }
    
    function renderWrongListView() {
        const wrongQuestions = questionBank.filter(q => wrongSet.has(q.id));
        const isAdmin = currentUser?.role === 'admin';
        if (wrongQuestions.length === 0) {
            return `<div class="card"><div class="empty-tip">📭 暂无错题，继续加油～</div></div>`;
        }
        let wrongHtml = `<div class="card"><div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;"><h3>📖 错题本</h3><button id="clearAllWrongBtn" class="danger-btn">清空所有错题</button></div><div class="wrong-list-container">`;
        wrongQuestions.forEach(q => {
            wrongHtml += `
                <div class="wrong-item">
                    <div class="wrong-q-title">📌 题号：${q.id}</div>
                    <div class="wrong-q-text">${escapeHtml(q.text)}</div>
                    <div class="wrong-actions">
                        <button class="small-btn primary practice-wrong" data-id="${q.id}">📖 练习本题</button>
                        <button class="small-btn danger remove-wrong" data-id="${q.id}">🗑 移出错题本</button>
                        ${isAdmin ? `<button class="small-btn edit-wrong-admin" data-id="${q.id}">✏️ 编辑</button>` : ''}
                    </div>
                </div>
            `;
        });
        wrongHtml += `</div></div>`;
        return wrongHtml;
    }
    
    function attachEventListeners() {
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const mode = btn.getAttribute('data-mode');
                if (mode === 'quiz') currentMode = 'quiz';
                else if (mode === 'wrong') currentMode = 'wrong';
                renderMainContent();
            });
        });
        if (currentMode === 'quiz') {
            const q = getCurrentQuestion();
            if (q) {
                document.getElementById('correctAnswerBtn')?.addEventListener('click', () => handleAnswer(true));
                document.getElementById('incorrectAnswerBtn')?.addEventListener('click', () => handleAnswer(false));
                document.getElementById('prevBtn')?.addEventListener('click', () => { if(questionBank.length) { currentIndex = (currentIndex - 1 + questionBank.length) % questionBank.length; saveProgress(); renderMainContent(); } });
                document.getElementById('nextBtn')?.addEventListener('click', () => { if(questionBank.length) { currentIndex = (currentIndex + 1) % questionBank.length; saveProgress(); renderMainContent(); } });
                document.getElementById('removeCurrentWrongBtn')?.addEventListener('click', () => { const cur = getCurrentQuestion(); if(cur) removeFromWrongSet(cur.id); });
                if (currentUser?.role === 'admin') {
                    document.getElementById('editCurrentQuestionBtn')?.addEventListener('click', () => { editingQuestionId = getCurrentQuestion().id; renderMainContent(); });
                    document.getElementById('addQuestionBtn')?.addEventListener('click', () => addNewQuestion());
                    document.getElementById('resetAllDataBtn')?.addEventListener('click', () => resetAllData());
                    const saveEdit = document.getElementById('saveEditBtn');
                    if (saveEdit) saveEdit.addEventListener('click', () => {
                        const newText = document.getElementById('editText').value;
                        const correctVal = document.querySelector('input[name="editCorrect"]:checked')?.value;
                        const newExplanation = document.getElementById('editExplanation').value;
                        if (newText && correctVal) saveQuestionEdit(editingQuestionId, newText, correctVal === 'true', newExplanation);
                        else alert("请填写完整");
                    });
                    document.getElementById('cancelEditBtn')?.addEventListener('click', () => { editingQuestionId = null; renderMainContent(); });
                    document.getElementById('deleteQuestionBtn')?.addEventListener('click', () => { if(editingQuestionId) deleteQuestion(editingQuestionId); });
                }
            }
        } else if (currentMode === 'wrong') {
            document.querySelectorAll('.practice-wrong').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.getAttribute('data-id');
                    const idx = questionBank.findIndex(q => q.id === id);
                    if (idx !== -1) { currentIndex = idx; currentMode = 'quiz'; saveProgress(); renderMainContent(); }
                });
            });
            document.querySelectorAll('.remove-wrong').forEach(btn => {
                btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); removeFromWrongSet(id); });
            });
            document.getElementById('clearAllWrongBtn')?.addEventListener('click', () => clearAllWrong());
            if (currentUser?.role === 'admin') {
                document.querySelectorAll('.edit-wrong-admin').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = btn.getAttribute('data-id');
                        editingQuestionId = id;
                        currentMode = 'quiz';
                        const targetIdx = questionBank.findIndex(q => q.id === id);
                        if (targetIdx !== -1) currentIndex = targetIdx;
                        renderMainContent();
                    });
                });
            }
        }
    }
    
    function renderMainContent() {
        if (!currentUser) return;
        const modeBar = `
            <div class="mode-bar">
                <button class="mode-btn ${currentMode === 'quiz' ? 'active' : ''}" data-mode="quiz">📝 刷题模式</button>
                <button class="mode-btn ${currentMode === 'wrong' ? 'active' : ''}" data-mode="wrong">📚 错题本</button>
            </div>
        `;
        const content = currentMode === 'quiz' ? renderQuizView() : renderWrongListView();
        const roleText = currentUser.role === 'admin' ? '管理员 (可编辑题目)' : '普通用户';
        const adminHeader = `
            <div class="admin-header">
                <div class="user-badge">👤 ${currentUser.username} <span class="role-tag">${roleText}</span> | 共 ${questionBank.length} 题</div>
                <button id="logoutBtn" class="logout-btn">🚪 退出登录</button>
            </div>
        `;
        appRoot.innerHTML = adminHeader + modeBar + content;
        attachEventListeners();
    }
    
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    function showLogin() {
        appRoot.innerHTML = `
            <div class="login-overlay">
                <div class="login-card">
                    <h2>📚 双角色登录</h2>
                    <input type="text" id="loginUsername" class="login-input" placeholder="用户名" autocomplete="off">
                    <input type="password" id="loginPassword" class="login-input" placeholder="密码">
                    <button id="doLoginBtn" class="login-btn">登录</button>
                    <div id="loginError" class="error-msg"></div>                  
                </div>
            </div>
        `;
        document.getElementById('doLoginBtn')?.addEventListener('click', () => {
            const user = document.getElementById('loginUsername').value.trim();
            const pwd = document.getElementById('loginPassword').value.trim();
            if ((user === 'admin' && pwd === 'admin_123')) {
                currentUser = { username: 'admin', role: 'admin' };
                loadQuestionsFromLocal();
                loadWrongSet();
                loadProgress();
                renderMainContent();
            } else if ((user === 'user' && pwd === 'user_123456')) {
                currentUser = { username: 'user', role: 'user' };
                loadQuestionsFromLocal();
                loadWrongSet();
                loadProgress();
                renderMainContent();
            } else {
                document.getElementById('loginError').innerText = '用户名或密码错误';
            }
        });
    }
    
    function init() {
        showLogin();
    }
    init();
</script>
</body>
</html>

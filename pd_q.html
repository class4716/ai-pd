<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>判断题随机考试</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f4f7fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app-container {
            max-width: 950px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px -12px rgba(0,20,40,0.25);
            padding: 28px 30px 40px;
            transition: all 0.2s;
        }
        h1 {
            font-size: 26px;
            font-weight: 600;
            color: #0b2a4a;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #e9eff5;
            padding-bottom: 18px;
            margin-bottom: 24px;
        }
        h1 small {
            font-weight: 400;
            font-size: 16px;
            color: #4a6a8a;
            margin-left: auto;
        }
        .login-box {
            background: #f8faff;
            padding: 30px 28px;
            border-radius: 24px;
            border: 1px solid #e2eaf2;
            margin-top: 10px;
        }
        .login-box label {
            font-weight: 500;
            color: #1f3a57;
            display: block;
            margin-bottom: 6px;
        }
        .login-box input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d0ddee;
            border-radius: 60px;
            font-size: 15px;
            background: white;
            transition: 0.15s;
            margin-bottom: 16px;
        }
        .login-box input:focus {
            border-color: #2d7aff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(45,122,255,0.15);
        }
        .login-box .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            background: #eef3f9;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 15px;
            color: #1f3a57;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #1f3a57;
            color: white;
        }
        .btn-primary:hover {
            background: #0b2a44;
            transform: scale(0.98);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #cbd7e6;
        }
        .btn-outline:hover {
            background: #e9eff5;
        }
        .btn-success {
            background: #1f8b4c;
            color: white;
        }
        .btn-success:hover {
            background: #15733e;
        }
        .btn-danger {
            background: #c52a3a;
            color: white;
        }
        .btn-danger:hover {
            background: #a82230;
        }
        .btn-secondary {
            background: #dce4ef;
        }
        .btn-secondary:hover {
            background: #c9d4e3;
        }
        .control-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px 12px;
            margin: 22px 0 18px;
            background: #f8faff;
            padding: 14px 20px;
            border-radius: 60px;
        }
        .control-bar label {
            font-weight: 500;
            color: #1f3a57;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-bar input[type="number"] {
            width: 70px;
            padding: 8px 10px;
            border: 1px solid #d0ddee;
            border-radius: 40px;
            text-align: center;
            font-weight: 500;
            background: white;
        }
        .question-grid {
            margin: 20px 0 30px;
        }
        .question-item {
            background: #fafdff;
            border-radius: 18px;
            padding: 18px 22px;
            margin-bottom: 16px;
            border: 1px solid #e6eef8;
            transition: 0.1s;
        }
        .question-item.correct {
            border-left: 6px solid #1f8b4c;
            background: #f4fcf7;
        }
        .question-item.wrong {
            border-left: 6px solid #c52a3a;
            background: #fdf6f7;
        }
        .q-text {
            font-weight: 500;
            color: #0a1e32;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 12px;
            display: flex;
            gap: 8px;
        }
        .q-index {
            color: #4a6a8a;
            font-weight: 600;
            min-width: 30px;
        }
        .options {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
            margin: 6px 0 4px;
        }
        .options label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 450;
            color: #1f3a57;
        }
        .options input[type="radio"] {
            accent-color: #1f3a57;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .explanation {
            margin-top: 12px;
            padding: 12px 16px;
            background: #eef4fa;
            border-radius: 14px;
            font-size: 14px;
            color: #1a334d;
            display: none;
            border-left: 4px solid #2d7aff;
        }
        .explanation .answer-badge {
            display: inline-block;
            font-weight: 700;
            padding: 2px 14px;
            border-radius: 40px;
            background: #1f3a57;
            color: white;
            font-size: 13px;
            margin-right: 12px;
        }
        .score-area {
            background: #f0f6fe;
            border-radius: 60px;
            padding: 16px 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin: 24px 0 18px;
        }
        .score-big {
            font-size: 26px;
            font-weight: 700;
            color: #0b2a4a;
        }
        .action-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .footer-info {
            font-size: 14px;
            color: #4f6f8f;
            text-align: center;
            margin-top: 20px;
            border-top: 1px solid #e6edf6;
            padding-top: 20px;
        }
        .hidden {
            display: none !important;
        }
        .mt-1 { margin-top: 8px; }
        .text-muted { color: #5f7d9c; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .gap-2 { gap: 8px; }
        .tag {
            background: #dce4ef;
            border-radius: 40px;
            padding: 4px 14px;
            font-size: 13px;
            font-weight: 500;
        }
        .wrong-tag { background: #fad1d6; color: #a82230; }
        .correct-tag { background: #c0e3d0; color: #15733e; }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <h1>
        📋 判断题随机考试
        <small id="userDisplay">未登录</small>
    </h1>

    <!-- 登录区域 -->
    <div id="loginArea" class="login-box">
        <div style="display: flex; gap: 16px; flex-wrap: wrap;">
            <div style="flex:1; min-width:180px;">
                <label>👤 用户名</label>
                <input type="text" id="usernameInput" value="" placeholder="">
            </div>
            <div style="flex:1; min-width:180px;">
                <label>🔒 密码</label>
                <input type="password" id="passwordInput" value="" placeholder="">
            </div>
        </div>
        <div class="btn-row">
            <button class="btn btn-primary" id="loginBtn">🔑 登录</button>
            <button class="btn btn-outline" id="logoutBtn" style="display:none;">🚪 退出</button>
            <span class="text-muted" style="margin-left:auto; font-size:14px;"></span>
        </div>
        <div id="loginError" class="text-muted" style="color:#b13a3a; margin-top:10px;"></div>
    </div>

    <!-- 主测试区 (登录后显示) -->
    <div id="testArea" class="hidden">
        <!-- 控制条 -->
        <div class="control-bar">
            <label>📊 抽取题数
                <input type="number" id="questionCountInput" min="1" max="30" value="10">
            </label>
            <button class="btn btn-primary" id="generateBtn">🔄 生成试卷</button>
            <button class="btn btn-secondary" id="resetBtn">↺ 重置</button>
            <span style="margin-left:auto; font-size:14px; color:#4a6a8a;" id="statusInfo">就绪</span>
        </div>

        <!-- 题目列表 -->
        <div id="questionList" class="question-grid"></div>

        <!-- 底部操作 -->
        <div class="score-area">
            <span class="score-big" id="scoreDisplay">0 / 0</span>
            <div class="action-group">
                <button class="btn btn-success" id="submitBtn">📨 交卷</button>
                <button class="btn btn-outline" id="showWrongBtn">📕 错题本</button>
                <button class="btn btn-outline" id="clearWrongBtn">🗑️ 清空错题</button>
            </div>
        </div>
        <div class="footer-info">
            ✅ 每题1分 · 交卷后显示解析 & 正确答案 · 错题本自动保存
        </div>
    </div>
</div>

<script>
    (function(){
        // ----- 题库 (从题目文件中提取 1082~1432) -----
        const rawQuestions = [
            { id: 1082, text: "ETL 数据整合工具是一种硬件，用于把数据从源系统中提取出来，经过转换后加载到目标系统。", answer: false, explanation: "ETL数据整合工具是用于将数据从源系统提取、转换和加载到目标系统中的软件。" },
            { id: 1083, text: "当数据样本数量较少时，简单的算法更容易产生过拟合现象。", answer: false, explanation: "数据样本量过少会限制模型从训练数据中学习到足够的特征和模式，导致模型不能充分捕捉数据中的复杂性，进而出现欠拟合。" },
            { id: 1084, text: "图像增强技术在人脸表情识别领域有着广泛的应用。", answer: true, explanation: "图像增强是一种特殊的处理方法，它根据需要突出图像的细节，忽略或清除不需要的信息，使处理结果更适合人类视觉特性或机器识别系统。" },
            { id: 1085, text: "在 Word 中插入目录的方法是：先把光标定位到想要插入目录的位置，然后在菜单栏中点击 “引用” 选项卡，选择 “目录” 按钮，在弹出的下拉菜单中选取合适的目录，也可以自定义目录，之后 Word 就会生成包含章节标题和页码的目录。", answer: true, explanation: "在word中插入目录，先将光标放在希望插入目录的位置，在菜单栏中选择“引用”选项卡，点击“目录”按钮，在下拉菜单中选择适当的目录，也可自定义目录，Word将生成一个包含章节标题和页码的目录。" },
            { id: 1086, text: "聚类分析中，同一簇内的对象具有很高的相似性，而不同簇之间的对象则具有很大的差异性。", answer: true, explanation: "划分聚类的结果旨在使簇与簇之间的相似性低，而簇内部的相似度高。" },
            { id: 1087, text: "数据的归类与定义工作，能够对审核时发现的错误加以修正。", answer: false, explanation: "标注数据审核能够对审核过程中发现的错误进行纠正。" },
            { id: 1088, text: "在 Word 中设置多级列表时，需先选中要修改的文本或编号列表，接着在 “布局” 选项卡的 “段落” 组中，点击 “多级列表” 按钮旁边的下拉箭头，再选择 “定义新的多级列表”，就能生成多级列表了。", answer: false, explanation: "Word中设定多级列表要先选择要更改的文本或编号列表，在“开始”选项卡上的“段落”组中，单击“多级列表”按钮向下箭头，然后单击“定义新的多级列表”。" },
            { id: 1089, text: "业务流程重组（BPR）主要依靠信息技术（IT）来实现企业流程的简化，组织变革并不是它的实现手段。", answer: false, explanation: "业务流程重组（BPR）的实现手段不仅包括利用信息技术（IT）来改造和简化企业流程，还包括组织变革以达到组织精简和效率提高的目的。两者都是实现BPR的手段。" },
            { id: 1090, text: "数据标注任务的高重复性可能会让标注人员感到疲劳和厌烦，进而对标注质量与效率产生影响。", answer: true, explanation: "现阶段的数据标注工作主要还是依靠人来完成的，但是当标注人员面对百万级别的标注数据量，或是复杂的标注任务时，容易产生极大的心理压力，而造成标注质量不合格。" },
            { id: 1091, text: "我国公民的个人信息依法受到保护，任何组织和个人都不得损害自然人的个人信息权益。", answer: true, explanation: "《中华人民共和国个人信息保护法》第二条规定，自然人的个人信息受法律保护，任何组织、个人不得侵害自然人的个人信息权益。" },
            { id: 1092, text: "jieba 分词的文本分词与清洗环节，需要对原始文本实施分词和去除停用词的操作。", answer: true, explanation: "jieba分词的文本分词与清洗步骤需对原始文本进行分词，并去除停用词。" },
            { id: 1093, text: "存储介质是应用程序和用户用来接收、保存、读取及索引电子数据的物理设备。", answer: true, explanation: "存储介质(StorageMedia)是应用程序和用户用以接收、保留、读取和索引电子数据的物理设备。" },
            { id: 1094, text: "在每次模型训练时，按一定概率随机移除神经网络模型中指定层的节点及其相连权重，这种做法能够直接解决算法的欠拟合问题。", answer: false, explanation: "Dropout为深度学习中特有的防止神经网络模型出现过拟合现象的方法。Dropout的原理比较简单，在每一次模型训练时，按照一定的概率随机去掉神经网络模型中指定层的单元(节点)和与之相连接的权重。" },
            { id: 1095, text: "人机交互指的是人们借助输入输出设备与计算机沟通以达成某一任务的方式，其核心在于探索如何将计算机技术与人相联结，让计算机技术尽可能贴合人性。", answer: true, explanation: "人机交互是指人们通过输入输出设备与计算机进行通信，以完成特定任务的过程。人机交互研究的核心是如何将计算机技术与人类用户的需求和能力相结合，以实现计算机技术的最优化人性化设计。" },
            { id: 1096, text: "在指导初级工作人员处理数据标注相关问题时，当数据标注工作全部结束后，一般要利用技术方法，将标注得到的结果转换为符合特定需求的格式。", answer: true, explanation: "数据标注完之后，一般需要通过技术手段将标注的结果转换为特定的需求格式。" },
            { id: 1097, text: "NoSQL 数据库完全不支持 ACID（原子性、一致性、隔离性、持久性）事务。", answer: false, explanation: "NoSQL数据库不一定支持ACID（原子性、一致性、隔离性、持久性）事务，而不是完全不支持。" },
            { id: 1098, text: "采用正则化方法能够增强模型对输入数据的敏感性。", answer: false, explanation: "从正则化的目的和作用来看，正则化的目标是为了减少模型对输入数据的小变化的敏感性，从而减少过拟合。" },
            { id: 1099, text: "决策树算法中，执行剪枝操作是为了加快模型的训练速度。", answer: false, explanation: "剪枝操作的主要目的是为了防止决策树过拟合，而不是提高训练速度。" },
            { id: 1100, text: "目前，数据标注工作大多仍由人工完成，面对百万级别的标注数据量或是复杂的标注任务，很容易出现标注质量不达标的情况。", answer: true, explanation: "现阶段的数据标注工作主要还是依靠人来完成的，但是当标注人员面对百万级别的标注数据量，或是复杂的标注任务时，容易产生极大的心理压力，而造成标注质量不合格。" },
            { id: 1101, text: "阈值分割不需要设定灰度阈值来界定目标区域的边界。", answer: false, explanation: "灰度阈值分割法是图像分割领域中最常用的图像分割方法之一，其思路是对图像中每个像素的灰度开展分类，并设置灰度阈值来确定目标区域的边界。" },
            { id: 1102, text: "阈值分割的基本原理是依据比较结果把像素划分到不同类别中。", answer: true, explanation: "阈值分割的基本原理是通过设定一个或多个阈值，将图像中的像素分为两个或多个类别，将像素的灰度值与阈值进行比较，根据比较结果将像素分配到不同的类别。" },
            { id: 1103, text: "从数据源系统中提取目标系统所需的数据，这一操作便是 ETL 过程中的数据抽取。", answer: true, explanation: "ETL过程中的数据抽取是从数据源端的系统，抽取目标端系统需要的数据。" },
            { id: 1104, text: "LOTOS 模型主要包含交替 (Interleaving)、选择 (Choice)、同步 (Synchronization)、禁止 (Deactivation)、串行（sequentiality）等运行符。", answer: true, explanation: "LOTOS算符主要有以下几种：交替(Interleaving)、选择(Choice)、同步(Synchronization)、禁止(Deactivation)、串行（sequentiality）。" },
            { id: 1105, text: "过滤式特征选择算法是一类凭借数据自身的数值特征来完成特征选择的算法。", answer: true, explanation: "过滤式特征选择方法通过评估每个特征与目标变量之间的关系（如相关性、卡方检验等）来进行特征选择。它不依赖于任何机器学习模型，因此它是“数据驱动”的方法。" },
            { id: 1106, text: "当总轮廓系数接近 1 时，意味着簇内样本距离大，且簇间最近距离小，即聚类效果不理想。", answer: false, explanation: "当总轮廓系数接近于1时，说明簇内样本的平均距离a非常小，而簇间的最近距离b非常大，进而表示聚类效果非常理想。" },
            { id: 1107, text: "数据仓库能整合企业内部的多种数据源，从而为决策支持和业务分析提供一个统一的数据平台。", answer: true, explanation: "数据仓库的目的是构建面向分析的集成化数据环境，为组织或企业提供决策支持。" },
            { id: 1108, text: "在 Word 中调整段落间距的步骤是：选中需要设置格式的段落，然后在 “段落” 工具栏或者 “开始” 选项卡的 “段落” 组中，点击段前段后间距的下拉箭头，从中挑选合适的选项或者自定义数值。", answer: true, explanation: "在word中调整段落间距，选中要设置格式的段落，在\"段落\"工具栏或\"开始\"选项卡的\"段落\"组中，点击段前段后间距的下拉箭头，选择合适的选项或自定义数值。" },
            { id: 1109, text: "在人机交互的任务分析方法中，“任务金字塔” 主要用于展示用户完成任务时具体的步骤先后次序。", answer: false, explanation: "任务金字塔的作用是展示不同层次任务之间的关系，层次结构越高，任务越宏观。它不是专门用于描述任务步骤的顺序，而是用来揭示任务的层级和子任务的依赖关系。" },
            { id: 1110, text: "专业行为、诚信和诚实、尊重和公平、保密和隐私、个人至上、不断学习和改进属于职业道德的基本内涵。", answer: false, explanation: "职业道德的基本内涵包含专业行为、诚信和诚实、尊重和公平、保密和隐私、社会责任、不断学习和改进。不包括个人至上。" },
            { id: 1111, text: "业务分析方法的三个主要组成部分包括市场趋势分析、客户行为分析和竞争对手分析。", answer: false, explanation: "业务分析方法的三个主要构成部分——业务指标分析、业务模型分析及业务分析方法论。" },
            { id: 1112, text: "当劳动合同被确认无效时，即便劳动者已经付出劳动，用人单位也可以不向其支付劳动报酬。", answer: false, explanation: "《中华人民共和国劳动合同法》第二十八条规定，劳动合同被确认无效，劳动者已付出劳动的，用人单位应当向劳动者支付劳动报酬。" },
            { id: 1113, text: "区域生长的核心原理是从图像中的种子点着手，通过合并具备相似特征的相邻像素，逐步扩展形成相互连通的区域。", answer: true, explanation: "区域生长的基本原理是从图像中的种子点开始，通过合并具有相似特征的相邻像素，逐渐扩展形成连通的区域。" },
            { id: 1114, text: "相较于初级阶段，管理阶段对培训管理工作的考核标准有了提升，除了留意每场培训活动的各项指标外，通常还会把培训计划的完成比例纳入考核范围。", answer: true, explanation: "管理阶段对培训管理工作的考核指标相比初级阶段得到了升级，除了关注每场培训活动的指标之外，一般还包括培训计划达成率、计划课程的参训率等。" },
            { id: 1115, text: "在 PowerPoint 中，在 “幻灯片版式” 里选择对应的版式，这些版式都是基于 “幻灯片母版” 创建的幻灯片模板。", answer: true, explanation: "PowerPoint 中，”幻灯片版式“决定了幻灯片上内容的排列方式，例如标题、文本框、图片等的布局。它们是基于“幻灯片母版”创建的。" },
            { id: 1116, text: "智慧城市是指采用物联网、云计算、移动互联网等技术手段，以提高人民收入水平为目的。", answer: false, explanation: "智慧城市是指通过广泛采用物联网、云计算、移动互联网、大数据等新一代信息技术，提高城市规划、建设、管理、服务、生产、生活的自动化、智能化水平。" },
            { id: 1117, text: "从业人员若要遵守 “追求卓越” 的基本要求，就应当致力于不断提升自身的专业素养。", answer: true, explanation: "遵守\"追求卓越\"的基本要求，从业人员应该追求专业素养的不断提升。积极参与相关领域的学习和培训，关注行业动态和最新发展。" },
            { id: 1118, text: "“恪尽职守” 的基本要求，是指从业人员在履行职责和完成工作任务时可以随意行动，只需遵守岗位要求即可。", answer: false, explanation: "\"恪尽职守\"基本要求指的是从业人员在履行职责和工作任务时应该尽职尽责，恪守岗位职责和道德准则。" },
            { id: 1119, text: "在经营活动中，若要条理清晰地表达信息，就需要按照 SWOT 法来组织语言。", answer: false, explanation: "在经营活动之中，要想有逻辑地表达信息，就需要按照PREP法(结论一理由一事例一结论)的顺序来组织语言。" },
            { id: 1120, text: "图像处理包含图像的增强、复原以及解释等内容。", answer: true, explanation: "图像处理通常包括对图像的存储、表示、提取、操作、增强、复原和解释，目的是改善图像质量或从图像中提取信息。" },
            { id: 1121, text: "采用 k 折交叉验证划分数据时，会将数据集分成 k 个规模相近的子集，其中 k-1 个子集的交集作为训练集。", answer: false, explanation: "k折交叉验证将数据集分成k个大小相似的子集，k-1个子集的并集作为训练集，剩下的一个子集作为测试集。" },
            { id: 1122, text: "漏斗分析能够把用户在某电商平台的购买流程当作一个整体，对其中各关键步骤的转化率及随时间的变动情况展开分析。", answer: true, explanation: "比如用户在某电商平台的购买流程包含浏览商品、点击商品详情、发起拼单、立即支付、支付完成等步骤，漏斗分析可以将该流程视为一个整体。" },
            { id: 1123, text: "人机交互的原型设计是依据需求文档，设计出产品各阶段所需的原型。", answer: true, explanation: "原型设计是根据需求文档设计各阶段所需的产品原型，探索满足需求的各种解决方案(包括任务流和页面交互)。" },
            { id: 1124, text: "对比分析法只包括对行业趋势、竞品的分析以及与自身的同比、环比比较，不涵盖其他类型的对比。", answer: false, explanation: "对比分析法是一种广泛应用于数据分析的方法，用于通过确定对比对象和对比维度，对目标事物和对比事物进行比较。虽然行业对比、竞品对比、与自身同比、环比是比较常见和基础的对比类型，但对比分析法的应用范围远不止于此。" },
            { id: 1125, text: "人机交互设计是一个不断迭代的过程，每个阶段都可能需要反复进行反馈和调整。", answer: true, explanation: "人机交互设计流程是一个循环选代的过程，每个阶段都可能涉及到多次迭代，以确保最终的设计既满足用户需求，又符合技术可行性。" },
            { id: 1126, text: "算法的时间复杂度所反映的，是算法运行时间随着输入数据规模扩大而变化的趋势。", answer: true, explanation: "时间复杂度是用来表示算法执行时间如何随着输入规模 n 的增长而变化的函数。它描述了算法在最坏、最好或平均情况下的运行时间增长规律。" },
            { id: 1127, text: "精确率（Precision）、召回率（Recall）、准确率（Accuracy）都属于回归模型的评估指标。", answer: false, explanation: "评估指标可以直观反映模型分类或回归效果的优劣。常用的分类模型评估指标有精确率（Precision）、召回率（Recall）、准确率（Accuracy）、F1值、AUC和K-S。常用的回归模型评估指标有MSE、RMSE、MAE和MAPE。" },
            { id: 1128, text: "中文分词模型的作用是把中文文字序列切分成中文里最小的语义单位 —— 词语。", answer: true, explanation: "不同于单词以及分隔单词的空格符组成文本序列的英文文本，中文文本需要通过分词模型切分出词语。中文分词模型将原来的中文文字序列中切分出中文最小语义单位——词语。" },
            { id: 1129, text: "ETL 工具的主要功能是直接从源系统抽取数据，不做任何转换就加载到目标数据库中。", answer: false, explanation: "ETL的核心是 Extract（抽取）、Transform（转换）、Load（加载），转换是必要阶段，包括数据清洗、整合等操作。" },
            { id: 1130, text: "从业人员遵守 “勤勉好学” 的基本要求，能够保持积极主动的工作态度，不断提高自身的专业素养和能力。", answer: true, explanation: "通过遵守\"勤勉好学\"的基本要求，从业人员可以保持积极主动的工作态度，不断提升自己的专业素养和能力。" },
            { id: 1131, text: "在分类任务中，KNN 算法会将输入样本的类别判定为 k 个最相似样本类别的加权平均。", answer: false, explanation: "KNN算法的原理是在训练样本集中找到与新样本最相近的k个样本，根据这k个样本的类别标签进行投票决定新样本的类别；在回归任务中，KNN算法通过k个最相似样本的值的加权平均来判定输入样本的值。" },
            { id: 1132, text: "分词是按照特定规范，把连续的字序列重新组合成具有独立语义的词序列的操作。", answer: true, explanation: "分词就是将连续的字序列按照一定的规范重新组合成语义独立词序列的过程。" },
            { id: 1133, text: "HBase、MySQL、Redis 等都属于数据存储工具。", answer: true, explanation: "HBase、MySQL和Redis都是常见的数据存储工具。" },
            { id: 1134, text: "按照《中华人民共和国商标法》，自然人、法人或者其他组织在从事生产经营活动时，若其商品或服务需要获得商标专用权，应当向商标局提出商标注册申请。", answer: true, explanation: "根据《中华人民共和国商标法》第四条规定，自然人、法人或者其他组织在生产经营活动中，对其商品或者服务需要取得商标专用权的，应当向商标局申请商标注册。" },
            { id: 1135, text: "输出设备是可以把计算机系统处理后的信息进行输出和展示的设备，比如显示器、键盘、打印机、绘图仪等。", answer: false, explanation: "输出设备指将计算机系统处理后的信息输出和显示的计算机设备。现有计算机系统的输出设备主要有显示器、打印机、绘图仪等，而键盘属于输入设备。" },
            { id: 1136, text: "从业者向相关方面及时、清晰地提供信息，且保证对方知晓信息的真实性与重要程度，这种做法违背了诚实公正基本要求中的公正原则。", answer: false, explanation: "诚实公正基本要求的公正：从业人员应该公正地对待所有相关方，不偏袒任何一方。基于客观事实和公正标准做出决策和评估。" },
            { id: 1137, text: "运用支持向量机算法时，距离超平面越近的点，越容易被正确分类。", answer: false, explanation: "使用支持向量机算法时，从几何直观上来说，越接近超平面的点越难分隔。支持向量机的目标是找到一个最佳的超平面，将不同类别的数据分开。距离超平面较近的点，通常是分类的边界点，即支持向量，正是这些点最难分类。" },
            { id: 1138, text: "外部市场环境变化日益加快，企业内部运行效率却迟迟没有提升，现有的组织结构和运行模式与当前多变的市场及经营环境不匹配，企业现有的业务流程迫切需要调整和优化。然而，企业在业务流程优化过程中面临着诸多问题，解决这些问题、实现流程优化都需要遵循一定的原则。", answer: true, explanation: "外部市场环境变化越来越快，企业内部运行效率迟迟得不到提升，现有的组织结构及运行模式与现有的、多变的市场环境及经营环境相脱离，企业现有的业务流程亟须调整、优化。但是企业业务流程优化面临着诸多问题，这些问题的解决、业务流程的优化都需要遵循一定的原则。" },
            { id: 1139, text: "Apriori 算法采用的是自顶向下、逐层搜索的迭代方法。", answer: false, explanation: "传统的关联规则算法主要分为Apriori算法和FP-Growth算法两大类。Apriori算法是一种挖掘频繁项集的经典方法。Apriori算法是一种自底向上逐层搜索的迭代方法。" },
            { id: 1140, text: "职业道德是社会道德体系的重要组成部分，仅具备社会道德的一般作用。", answer: false, explanation: "职业道德是社会道德体系的重要组成部分，它一方面具有社会道德的一般作用，另一方面它又具有自身的特殊作用。" },
            { id: 1141, text: "读取本地数据的方式，主要针对 txt、csv 格式的文本数据，且只能使用 read_csv 方法。", answer: false, explanation: "读取本地数据的用法，主要是包括txt、csv格式的文本数据，主要是使用read_csv和read_table。" },
            { id: 1142, text: "许可他人行使软件著作权或者转让软件著作权时，双方可以通过口头协商达成一致。", answer: false, explanation: "《计算机软件保护条例》第十九条规定，许可他人专有行使软件著作权的，当事人应当订立书面合同。" },
            { id: 1143, text: "设备管理的主要作用是采用统一的方式来控制、管理和访问多种多样的内部设备。", answer: false, explanation: "设备管理的主要作用是使用统一的方式控制、管理和访问种类繁多的外部设备。" },
            { id: 1144, text: "从业者应当说真话，不能故意做虚假陈述或隐瞒实情，要提供准确、真实、完整的信息，避免误导他人，这体现了诚实公正基本要求里的诚实原则。", answer: true, explanation: "诚实公正基本要求的诚实：从业人员应该说实话，不得故意虚假陈述或隐瞒事实。提供准确、真实和完整的信息，不得误导他人。" },
            { id: 1145, text: "生疏型用户在使用产品时，往往由于不熟悉操作而容易产生挫败感。", answer: true, explanation: "生疏型用户由于他们对功能和界面的不熟悉，容易感到沮丧和迷茫，因此容易受到挫折。他们对产品并不熟悉，常常需要反复试探，操作上可能会遇到困难或挫折。" },
            { id: 1146, text: "逻辑树也被称作问题树、演绎树和分解树等，它不仅是界定问题与议题之间联系的桥梁，还能在解决问题的过程中帮助建立共识。", answer: true, explanation: "逻辑树又被称为问题树、演绎树和分解树等，不但是我们界定问题与议题之间联系的纽带，而且还能在解决问题的过程中建立一种共识。" },
            { id: 1147, text: "计算机里的运算器，又被叫做中央处理器。", answer: false, explanation: "运算器和控制器合称为中央处理器（CPU），在微型计算机中又称为微处理器，它是计算机硬件的核心部件。" },
            { id: 1148, text: "当前，新型人机交互设备主要以实现自然人机交互为宗旨，其中体感交互设备是重要的代表之一。", answer: true, explanation: "目前，新型人机交互设备主要以自然人机交互为目标，包括体感交互设备、增强现实（AR）和虚拟现实（VR）设备、智能机器人等。" },
            { id: 1149, text: "漏斗分析是通过漏斗图来呈现分析结果的方法，主要用于对包含多个步骤的流程进行整体层面的分析。", answer: true, explanation: "漏斗分析即通过漏斗图的方式展示分析结果，主要用于对一个有多步骤的流程进行整体分析。" },
            { id: 1150, text: "企业对技术人员的培训涉及多个维度，而企业所需的技术人员应具备综合的能力与素养。", answer: true, explanation: "根据技术人员的特点，对技术人员培训的主要项目有：计算机编程，程序和网络维护、操作，新设备的维护、维修与操作，安全常识，产品知识，全面质量管理，目标管理，管理信息系统，市场营销，财务管理，新产品研制，材料替代，生产管理，工业工程，品质工程等。对技术人员的培训是多方面的，也就是说，企业所需要的技术人员应该具有较全面的能力和素质。" },
            { id: 1151, text: "流程优化工作要达成两个目标：一是找出存在的问题，确立统一的流程优化方向；二是就流程优化方案形成一致意见，推动后续流程的落实。", answer: true, explanation: "流程优化工作要达到两个目标:一是明确现存问题，构建统一的流程优化目标;二是针对流程优化方案形成共识，推动后续流程落地。" },
            { id: 1152, text: "业务流程重组（BPR）能够不依赖信息技术（IT）存在，但 IT 在 BPR 的实施中起到了重要的支持作用。", answer: true, explanation: "业务流程重组（BPR）确实可以独立于信息技术（IT）存在，但IT在BPR的实施中起到了重要的支持作用。BPR是一种管理思想，而IT是一种技术，两者相辅相成。" },
            { id: 1153, text: "数据增强的主要作用是扩充数据集，让模型能学习到更多的不变性，但无法增强模型的泛化能力，也不能降低过拟合的风险。", answer: false, explanation: "数据增强是一种在训练模型通过对原始图像进行变换或者合成来产生新的训练数据的技术。其主要目的是扩充数据集，使模型能够学习到更多的不变性，增加模型的泛化能力，同时减少过拟合的风险。" },
            { id: 1154, text: "逻辑回归能够解决回归问题和分类问题。", answer: false, explanation: "逻辑回归主要用于分类问题，特别是二分类问题。" },
            { id: 1155, text: "勤勉好学的基本要求有积极主动、刻苦努力、持续学习、探索创新、保持谦逊。", answer: true, explanation: "勤勉好学的基本要求包括积极主动、刻苦努力、持续学习、探索创新、保持谦逊。" },
            { id: 1156, text: "事件模式的运作机制是，输入设备与应用程序可各自独立运作，输入设备会把数据存进事件队列，应用程序则能随时对这些数据进行读取和处理。", answer: true, explanation: "事件模式的核心特点是输入设备和应用程序并行工作。输入设备将用户输入的数据保存到事件队列中，应用程序可以随时读取和处理这些事件。" },
            { id: 1157, text: "依据文件的保护时长，可将文件分为临时文件和永久文件两类。", answer: false, explanation: "根据文件的保护期限，可以把文件分成临时文件、档案文件和永久文件。" },
            { id: 1158, text: "对于多维度拆解分析方法，有两个关键词需要理解：维度和拆解。", answer: true, explanation: "对于多维度拆解分析方法，要理解两个关键词:维度、拆解。" },
            { id: 1159, text: "在设计图形用户界面时，务必确保用户实时查看的操作效果与最终输出的内容完全一致。", answer: true, explanation: "所见即所得是图形用户界面设计中的一个关键内容，指的是用户在界面上所看到的内容和他们最终获得的输出应该是完全一致的。" },
            { id: 1160, text: "随机森林算法仅能应用于数据量较小的场景。", answer: false, explanation: "随机森林算法是一种强大的集成学习方法，能够处理不同规模的数据集。它通过构建多个决策树并结合它们的预测结果来提高模型的性能。" },
            { id: 1161, text: "中值滤波的基本原理是，用数字图像序列中某点邻域内各点值的中值来替代该点的值。", answer: true, explanation: "中值滤波是一种非线性平滑滤波技术，由Turky于1971年提出，其基本原理是把数字图像序列中某点的值用该点邻域中各点值的中值代替。" },
            { id: 1162, text: "职业人员遵守法律法规，维护公平竞争秩序，不进行欺诈、腐败及其他不道德行为，还主动公开可能存在的利益冲突，这体现了职业道德中的尊重和公平。", answer: true, explanation: "诚信和诚实：职业人员应该遵循诚实、正直和诚信的原则，不作虚假陈述或隐瞒真相。遵守法律法规，维护公平竞争，不从事欺诈、腐败或不道德行为，并主动披露可能存在的利益冲突。" },
            { id: 1163, text: "按照象限分析的框架，公用事业的各项制度都在特定象限内运行，某一象限的特定制度一旦跨越到其他象限，就会出现制度性错位。", answer: true, explanation: "根据象限分析框架，公用事业的各项制度在特定的象限内运作，某一象限的特定制度不能跨越进入其他象限，否则会形成制度性错位。" },
            { id: 1164, text: "《中华人民共和国网络安全法》规定，网络产品与服务必须符合相关国家标准的强制性要求。", answer: true, explanation: "《中华人民共和国网络安全法》第二十二条规定，网络产品、服务应当符合相关国家标准的强制性要求。" },
            { id: 1165, text: "劳动合同里可以约定试用期，且试用期最长不能超过三个月。", answer: false, explanation: "根据《中华人民共和国劳动法》第二十一条规定，劳动合同可以约定试用期。试用期最长不得超过六个月。" },
            { id: 1166, text: "CBOW（Continuous Bag-of-Words）模型的理念是，依据输入的上下文词语来预测中心目标词语。", answer: true, explanation: "CBOW（Continuous Bag-of-Words）模型的思想是根据输入的上下文词语来预测中心目标词语。" },
            { id: 1167, text: "多维度拆解分析法就是从多个不同的角度去剖析事物原本的 “面貌”。", answer: true, explanation: "多维度拆解分析法就是从多个维度去分析事物本来的“面貌”。" },
            { id: 1168, text: "算法分析指标能够帮助我们理解算法，并为其优化提供指导。", answer: true, explanation: "复杂度分析揭示了算法的理论效率趋势，实际优化需综合考虑常数因子、硬件缓存等因素，但其仍是优化方向的核心依据。" },
            { id: 1169, text: "G-U-L 模型是由 GOMS 模型、UAN 模型和 LOTOS 模型这三个部分构成的。", answer: true, explanation: "G-U-L运用GOMS原理为基础进行任务分解， 建立基本的行为模型，原子操作由UAN模型 描述，在此基础上，运用LOTOS算符来表示 任务目标之间的时序关系。" },
            { id: 1170, text: "会员 RFM 模型中的 F 值分析表明，F 值代表顾客在单位时间内的消费金额，消费金额越高，说明顾客的忠诚度越高、潜力越大。", answer: false, explanation: "会员RFM模型中的F值分析，F值代表的是单位时间内顾客的消费频次，消费次数越高，忠诚度就越高，顾客的潜力越大。" },
            { id: 1171, text: "当处理 csv 格式的文本时，可采用 read_csv 和 read_table 方法来读取数据。", answer: true, explanation: "处理方式为csv文本时，读取数据可使用read_csv和read_table方法。" },
            { id: 1172, text: "在文本分类的工作中，朴素贝叶斯经常被当作基准模型用于对比。", answer: true, explanation: "朴素贝叶斯算法基于“特征条件独立性”的假设，这意味着它假设在给定类别的条件下，各特征之间是独立的。朴素贝叶斯能在许多任务中表现出不错的效果，尤其是在文本分类中。例如，垃圾邮件分类和情感分析等任务中，朴素贝叶斯常被用作一个强有力的基准模型。" },
            { id: 1173, text: "企业文化培训并不包含在初级培训之内。", answer: false, explanation: "初级培训通常针对新员工或转岗员工，旨在使他们了解公司的基本情况、规章制度、产品知识和业务流程等。这种培训通常包括企业文化培训。" },
            { id: 1174, text: "数据结构以及算法的分析与设计当中，包含了许多离散结构的内容。", answer: true, explanation: "数据结构和算法分析与设计中含有大量离散结构的内容。" },
            { id: 1175, text: "留出法会把数据集划分成两个相互独立的集合。", answer: true, explanation: "留出法将原始数据集划分为两个独立的子集：一个训练集和一个测试集。这两个子集是互不重叠的。" },
            { id: 1176, text: "数据分析能够直接基于原始数据开展，不必等到数据清洗与处理完成之后。", answer: false, explanation: "业务数据的主要流程为需求分析、数据获取、数据预处理、分析与建模、模型评价与优化和部署。" },
            { id: 1177, text: "语音识别（Speech Recognition）指的是机器通过识别和理解，把人类的语音信号转换成对应的文本或指令的技术。", answer: true, explanation: "语音识别(Speech Recognition)是机器通过识别和理解过程，将人类的语音信号转变为相应的文本或命令的技术。" },
            { id: 1178, text: "像 SSIS、ODI、Kettle、Informatica 等，都是比较常见的数据整合工具。", answer: true, explanation: "常见的数据整合工具有：SSIS、ODI、Kettle、Informatica等。" },
            { id: 1179, text: "K - 近邻算法能够应对分类问题和回归问题。", answer: true, explanation: "K近邻算法是最简单的分类回归方法，待预测实例点的标签由最近的K个邻居决定。" },
            { id: 1180, text: "业务流程重组（BPR）中的标杆瞄准（Benchmarking），是通过分析评价全球领先企业来确定最佳实践的一种过程。", answer: true, explanation: "标杆瞄准（Benchmarking）是BPR中的一项重要技术，它通过系统化地对世界领先企业进行评价，分析其最佳实践，从而确定本企业的业绩目标。" },
            { id: 1181, text: "在智慧农业的发展进程中，随着应用场景不断增加，会产生大量数据需要存储和处理，这就需要引入云计算技术架构来搭建智慧农业系统。", answer: true, explanation: "随着农业信息化的深入，智慧农业应用逐渐增多，会产生海量的数据需要保存和处理，而且初期的传统系统架构可能不能满足日益增加的用户和功能的需求。因此，在智慧农业的发展阶段，需要引入云计算技术架构来构建智慧农业系统。" },
            { id: 1182, text: "操作系统中的 “文件系统”，指的是操作系统里与文件管理相关的那部分软件、被管理的文件，以及管理文件时所需的数据结构（如目录、索引表等）的总和。", answer: true, explanation: "操作系统的“文件系统”，是指操作系统中与文件管理有关的那部分软件、被管理的文件，以及管理文件所需要的数据结构(如目录、索引表等)的总体。" },
            { id: 1183, text: "可借助 Python 的 audioop、aifc、wav 等库来实现，对于语音文件的读取。", answer: true, explanation: "对于语音文件的读取，可以使用Python的audioop、aifc、wav等库实现。" },
            { id: 1184, text: "图像增强是运用数字图像技术，对图像中需要关注的部分进行突出显示，对无需关注的部分加以抑制，让突出后的部分更加清晰。", answer: true, explanation: "图像增强是指利用数字图像技术对图像中感兴趣部分予以强调，对不感兴趣的部分予以抑制，强调后的部分更为清晰。" },
            { id: 1185, text: "自助法的优势体现在不需要对模型的数据生成过程作出具体的假设。", answer: true, explanation: "自助法的优点在于不必对模型的数据生成过程做出具体假定。它通过重抽样生成多个训练集，使得模型不依赖于特定的数据分布假设，从而增强了模型的泛化能力。" },
            { id: 1186, text: "在互联网运营工作中，趋势分析法可以简单理解为按时间顺序整理历史数据，再将其连成趋势线来展开分析。", answer: true, explanation: "趋势分析法通俗来讲，就是把历史数据按照发生时间排列，连成趋势线来分析。在互联网运营里，通过这种方式，可以直观地观察到相关指标随时间的走势和变化规律。" },
            { id: 1187, text: "收集那些规模庞大、生成迅速的大数据，并且能让这些来自多个源头、结构各异的大数据相互配合发挥作用，进而为大数据分析等应用提供有效支持，这是大数据采集阶段的任务，也是大数据的核心技术之一。", answer: true, explanation: "大数据的来源多种多样，如何获取这些规模大、产生速度快的大数据，并且能够使这些多源异构的大数据得以协同工作，从而有效地支撑大数据分析等应用，是大数据采集阶段的工作，也是大数据的核心技术之一。" },
            { id: 1188, text: "趋势分析法的核心目标是通过识别历史数据的规律，预测企业未来的财务状况或市场走向。", answer: true, explanation: "趋势分析法的作用是利用历史数据发现指标波动的规律，从而找出对应原因；同时也可以通过历史数据的趋势去预测未来。" },
            { id: 1189, text: "收集那些规模庞大、生成迅速的大数据，并且能让这些来自多个源头、结构相同的大数据相互促进发挥作用，进而为大数据分析等应用提供有效支持，这是大数据采集阶段的任务，也是大数据的核心技术之一。", answer: false, explanation: "大数据的来源多种多样，如何获取这些规模大、产生速度快的大数据，并且能够使这些多源异构的大数据得以协同工作，从而有效地支撑大数据分析等应用，是大数据采集阶段的工作。" },
            { id: 1190, text: "数据仓库适用于处理实时事务操作，比如订单录入、库存更新等日常业务操作。", answer: false, explanation: "数据仓库的核心用途是支持分析决策（OLAP），而非实时事务处理（OLTP）。事务操作（如订单录入）由OLTP系统处理，而数据仓库通过ETL定期抽取历史数据，供分析使用。" },
            { id: 1191, text: "简化过程是实施业务流程重组的主要技术，其核心方式是通过增设检查、校对和控制环节来提高流程的准确性。", answer: false, explanation: "实施业务流程重组的主要技术是简化过程，其核心是减少检查、校对和控制，以提高流程的效率和速度。" },
            { id: 1192, text: "在 PowerPoint 里，若想查看幻灯片切换的效果，可点击预览按钮；同时，借助 “计时” 组中的相应按钮，还能对切换的速度进行调整。", answer: true, explanation: "PowerPoint中可以通过单击预览按钮来预览切换效果，还可以通过“计时”组对应按钮调整切换速度。" },
            { id: 1193, text: "在移动界面设计过程中，图标剪影的角度、图形的复杂程度、图标在视觉上的占比尺寸以及图标线条的粗细，都是需要保证一致性的关键要素。", answer: true, explanation: "在移动界面设计中，确保图标剪影角度、图形复杂程度、视觉占比大小和线条粗细的一致性是非常重要的设计原则。这些元素保持一致性可以帮助用户在操作过程中减少认知负担，提升界面的整洁感和使用流畅性。" },
            { id: 1194, text: "智慧校园平台借助新一代信息技术，将学校各类应用系统和资源整合为统一的有机整体，实现基于静态数据分析的教学与管理决策。", answer: false, explanation: "智慧校园平台基于新一代信息技术手段，将学校各类应用系统和资源整合为一个有机整体，构建具有高度感知能力、协同能力和服务能力的新型信息化校园环境，实现基于动态数据分析的教学与管理决策。" },
            { id: 1195, text: "数据整合仅仅是将不同来源的数据合并到同一个存储系统中，不需要进行数据格式的转换或清洗。", answer: false, explanation: "整合数据中的数据转换是将从数据源端获取的数据按照业务需求，转换成目标端要求的数据形式，并对错误、不规范、不一致的数据进行清洗和加工。" },
            { id: 1196, text: "可用性设计的核心目标是保证用户能在最短时间内完成任务，而不用考虑用户的学习成本。", answer: false, explanation: "可用性设计的核心不仅是确保用户高效地完成任务（效率），还包括考虑用户在学习如何使用产品时的成本和难度（易于学习性）。" },
            { id: 1197, text: "业务流程重组（BPR）的目标是借助渐进式改进来完善现有的业务流程。", answer: false, explanation: "业务流程重组（Business Process Reengineering，简称BPR）的目标并不是通过渐进式的改进来优化现有业务流程。相反，BPR强调的是对现有业务流程进行根本性的再思考和彻底的再设计。" },
            { id: 1198, text: "严密思考、精确表达、谨慎处理、追求真相、持续学习都属于严谨求是的基本要求。", answer: true, explanation: "严谨求是的基本要求包括严密思考、精确表达、谨慎处理、追求真相、持续学习。" },
            { id: 1199, text: "频繁模式增长算法借助一种紧凑的数据结构 ——FP-tree，来存储和查找发现频繁项集所需的全部信息。", answer: true, explanation: "频繁模式增长(FP-Growth)算法利用一种紧缩的数据结构FP-tree来存储和查找频繁项集所需要的全部信息。" },
            { id: 1200, text: "以用户为中心的设计，只需看重用户的感受和体验，不必在意效率问题。", answer: false, explanation: "用户为中心的设计要求在设计过程中综合考虑多个方面，包括用户的感受、体验、效率以及产品的有效性等。设计并不是仅仅关注用户的主观感受，而是要确保用户能够在特定的使用场景中高效、顺畅地完成任务。" },
            { id: 1201, text: "《中华人民共和国商标法》规定，申请注册的商标必须具备显著特征，便于识别，且不得与他人此前已取得的合法权利相冲突。", answer: true, explanation: "根据《中华人民共和国商标法》第九条规定，申请注册的商标，应当有显著特征，便于识别，并不得与他人在先取得的合法权利相冲突。" },
            { id: 1202, text: "在处理分类问题时，KNN 算法的原理是：从训练样本集中筛选出与新样本最相似的 k 个样本，然后根据这 k 个最相似样本的类别投票结果，来确定新样本的类别。", answer: true, explanation: "KNN算法的原理是在训练样本集中找到与新样本最相近的k个样本，根据这k个样本的类别投票决定新样本的类别。" },
            { id: 1203, text: "提升度是关联规则置信度与规则后件在独立情况下出现概率的比值，用于衡量规则的预测效果。", answer: true, explanation: "提升度是关联规则置信度与独立情况下规则后件出现的概率之比，用于衡量规则的预测效果。提升度大于1表示X的出现对Y出现的可能性的提升程度越大。" },
            { id: 1204, text: "贝叶斯算法的原理是：已知条件概率和先验概率，借助贝叶斯公式求出后验概率，再按照后验概率的大小来做决策分类。", answer: true, explanation: "贝叶斯算法是统计学中一个基本的决策模型，其基本思想是利用已知的条件概率和先验概率，通过贝叶斯公式计算后验概率，然后根据后验概率的大小进行决策分类。" },
            { id: 1205, text: "业务流程重组（BPR）的核心是围绕客户需求，所以在实施过程中，流程的设计与优化都应始终以客户需求为中心。", answer: true, explanation: "流程重组始于对客户需求的深度理解与全面把握，并且始终围绕客户需求进行。" },
            { id: 1206, text: "产生式规则是直接描述系统状态及状态转换的模型，可用于对人机交互过程中的行为加以刻画。", answer: false, explanation: "产生式规则并不直接描述系统的状态和状态转换，而是通过“条件-动作”对来定义交互规则。当某个条件被满足时，相应的动作就会被触发。它主要关注的是条件匹配与行为触发的关系，而不是状态变化。" },
            { id: 1207, text: "人机交互是一个跨学科的融合领域，仅包含计算机和通信两大科学的相关理论与方法。", answer: false, explanation: "物理空间中的人机交互是一个跨学科的研究领域,其中除了计算和通信这样的技术领域以外还涉及心理学、人机工程学、社会学等广泛领域。" },
            { id: 1208, text: "《中华人民共和国民法典》指出，技术服务合同的受托人应当按照约定完成服务项目、解决技术问题、保证工作质量，但无需传授解决技术问题的知识。", answer: false, explanation: "《中华人民共和国民法典》第八百八十三条规定，技术服务合同的受托人应当按照约定完成服务项目，解决技术问题，保证工作质量，并传授解决技术问题的知识。" },
            { id: 1209, text: "傅里叶频谱分析以傅里叶变换为基础，通过傅里叶变换及其反变换，能够得到傅里叶谱、自相关函数、功率谱和倒谱。", answer: true, explanation: "傅里叶频谱分析的基础是傅里叶变换，用傅里叶变换及其反变换可以求得傅里叶谱、自相关函数、功率谱、倒谱。由于语音信号的特性是随着时间缓慢变化的，由此引出的语音信号短时分析。" },
            { id: 1210, text: "本・施耐德曼的界面设计八大黄金法则，是人机交互设计领域极具价值的指导规范。", answer: true, explanation: "施耐德曼的八项黄金法则是人机交互设计领域的重要指导原则，包括保持一致性、提供快捷方式、提供有效的信息反馈、会话和流程设计都有一个明确的结束点、提供恰当的错误处理机制、允许撤销、满足用户的控制需求、减少短期记忆负担。" },
            { id: 1211, text: "对于接受他人委托开发的软件，其著作权的归属由委托人和受托人签订书面合同来约定；若没有书面合同或者合同中未作出明确约定，该软件的著作权由受托人享有。", answer: true, explanation: "《计算机软件保护条例》第十一条规定，接受他人委托开发的软件，其著作权的归属由委托人与受托人签订书面合同约定；无书面合同或者合同未作明确约定的，其著作权由受托人享有。" },
            { id: 1212, text: "流程优化工作的目标仅仅包括明确现存问题和构建统一的流程优化目标。", answer: false, explanation: "流程优化工作的目标不仅包括明确现存问题和构建统一的流程优化目标，还包括针对流程优化方案形成共识，推动后续流程落地。流程优化是一个多阶段的过程，涉及识别问题、设定目标、形成共识以及实施落地等多个环节。" },
            { id: 1213, text: "《民法典》自 2021 年 5 月 1 日起正式施行。该法典施行后，现行的《婚姻法》《继承法》《民法通则》《收养法》《担保法》《合同法》《物权法》《侵权责任法》《民法总则》将同时废止。", answer: false, explanation: "《中华人民共和国民法典》第一千二百六十条规定，本法自2021年1月1日起施行。《中华人民共和国婚姻法》、《中华人民共和国继承法》、《中华人民共和国民法通则》、《中华人民共和国收养法》、《中华人民共和国担保法》、《中华人民共和国合同法》、《中华人民共和国物权法》、《中华人民共和国侵权责任法》、《中华人民共和国民法总则》同时废止。" },
            { id: 1214, text: "在 Excel 中，对单元格或表格区域的数据进行筛选后，既可以重新应用筛选器来获取最新结果，也能清除筛选器以重新显示所有数据。", answer: true, explanation: "Excel筛选单元格或表格区域中的数据后，可以重新应用筛选器以获取最新结果，或者清除筛选器以重新显示所有数据。" },
            { id: 1215, text: "使用逻辑回归算法时，求解模型的问题可以转化为对目标函数的最小化问题。", answer: true, explanation: "在逻辑回归算法中，模型的训练是通过最小化目标函数（如对数似然函数或交叉熵损失函数）来优化模型参数的。" },
            { id: 1216, text: "在人机交互的多通道交互研究里，用户能够运用语音、手势、眼神、表情等自然的交互方式与计算机系统进行信息沟通。", answer: true, explanation: "在多通道交互中，用户可以使用语音、手势、眼神、表情等自然的交互方式与计算机系统进行交互。目前，最常使用的多通道交互技术包括手写识别、笔式交互、语音识别、语音合成、数字墨水、视线跟踪技术、触觉通道的力反馈装置、生物特征识别技术和人脸表情识别技术等方面。" },
            { id: 1217, text: "贝叶斯算法仅仅依据先验概率来做出最优决策。", answer: false, explanation: "贝叶斯算法是一种基于统计推断的方法，其核心思想是通过先验概率、条件概率（或似然函数）和贝叶斯公式计算后验概率，并根据后验概率做出决策。因此，贝叶斯算法的决策不仅依赖于先验概率，还需要条件概率和后验概率的计算。" },
            { id: 1218, text: "职业守则里提到的 “严谨求是” 基本要求，是指从业人员在工作中只需对数据保持严谨。", answer: false, explanation: "职业守则中的“严谨求是”基本要求不仅指的是从业人员在工作中对待数据严谨，更强调的是以认真、细致、客观和科学的态度来处理工作事务，追求真实、准确的结果，不掺杂个人情感和主观臆断。" },
            { id: 1219, text: "BOW 模型忽略了文档的词语顺序、语法句法等要素。", answer: true, explanation: "BOW 模型忽略文档的词语顺序、语法句法等要素，将文档看作若干个词汇的集合，文档中每个词都是独立的。" },
            { id: 1220, text: "状态转换网络（STN）可以对并发行为以及复杂的多任务交互过程进行有效描述，故而适用于大型交互系统的设计工作。", answer: false, explanation: "状态转换网络（STN）的并发行为的描述能力较差。当系统具有大量状态和复杂的状态转换时，状态转换网络的规模会迅速增长，导致设计和实现的困难。" },
            { id: 1221, text: "无监督图像去噪方法只利用噪声图像来开展训练。", answer: false, explanation: "无监督去噪方法对训练数据的限制较少，仅使用噪声图像进行训练，代表性方法有Noise2Noise列。Noise2Noise(N2N)方法使用成对的噪声图像进行训练，要求噪声残差的期望为零。" },
            { id: 1222, text: "对比分析是把两个及以上具备可比性的数据进行对照，分析其中的差别，从而揭示事物的发展规律。", answer: true, explanation: "对比分析是数据分析中常用的分析方法之一，是将两个或两个以上具有可比性的数据进行比较，分析其中差异，以揭示事物发展规律。" },
            { id: 1223, text: "决策树算法的基本原理是依据某一指标来选定最合适的特征，将其作为当前节点的分割特征。", answer: true, explanation: "决策树算法的原理是根据某个指标（例如信息增益、基尼系数等），选择最佳的特征作为当前节点的分割特征。" },
            { id: 1224, text: "有必要指导初级工挑选合适的标注工具，并按照指定的规范要求开展标注工作。", answer: true, explanation: "在进行数据标注时，需要选择适合的标注工具，根据指定的规范要求进行标注。" },
            { id: 1225, text: "行为模型只能反映用户在使用产品或服务时展现出的一系列动作行为流程，它有助于预测用户的需求和期望，优化产品设计，进而提升用户体验。", answer: false, explanation: "行为模型是指用户在使用产品或服务时所展现出的一系列行为模式和心理过程，不仅限于动作行为。这种模型可以帮助我们预测用户的需求和期望，优化产品设计，并提供更好的用户体验。" },
            { id: 1226, text: "可以通过 Pillow 模块中 Image 对象的 open () 方法来打开一张图像。", answer: true, explanation: "可以采用Pillow模块中的Image对象的open()方法来打开一幅图像。" },
            { id: 1227, text: "神经网络算法的原理为：通过调整神经元之间的连接权值，运用反向传播算法计算梯度，并利用优化算法（如梯度下降）使损失函数达到最小，最终实现对数据的分类、回归、预测等任务。", answer: true, explanation: "神经网络算法是一种模拟人脑神经元结构的计算模型，主要通过调整神经元之间的连接权值来优化输出结果。神经网络的训练过程不仅仅涉及权值的更新，还包括通过反向传播算法链式法则计算损失函数对权重的梯度，为优化算法（如梯度下降）提供参数更新依据。" },
            { id: 1228, text: "AARRR 分别对应获取、激活、留存、收入和传播，这五个部分对应着某款产品生命周期中的 5 个重要环节。", answer: true, explanation: "AARRR分别是指获取、激活、留存、收入和传播，分别对应某一款产品生命周期中的5个重要环节。" },
            { id: 1229, text: "逻辑回归通过让对数似然函数达到最大来优化模型参数，进而找到最优的分类边界。", answer: true, explanation: "逻辑回归算法的优化目标是最大化对数似然函数。对数似然函数的最大化过程通过最大化样本数据的概率来找到模型参数，使得模型对分类任务的拟合度最优。" },
            { id: 1230, text: "AARRR 所对应的五个环节分别是获取、激活、增长、收入和推荐，它们对应着某一款产品生命周期中的 5 个关键环节。", answer: false, explanation: "AARRR分别是指获取、激活、留存、收入和传播，分别对应某一款产品生命周期中的5个重要环节。" },
            { id: 1231, text: "ETL 任务的调度策略中，并不包含对任务进行优先级调度这一项。", answer: false, explanation: "为了满足复杂的业务需求，以及不断膨胀的ETL任务列表，以及有限的资源，会在调度的基础逻辑上增加很多的策略，比如ETL任务的类别、按照优先级调度、运行开始时间要求、任务的资源限制等。" },
            { id: 1232, text: "依托 5G 技术的智慧医疗，是以医院现有的人力资源和医疗设备为根基，凭借高速率、低时延、广连接的 5G 网络，为患者提供实时化、远程化、高移动性及数字化的医疗服务，有效提升医疗效率与病情诊断的精准度，推动医疗资源向基层延伸，解决我国医疗资源分布不均衡、居民看病难、看病贵、医疗效率偏低、服务质量不高等问题。", answer: true, explanation: "以5G为依托的智慧医疗，指的是以医院现有的人力资源和医疗设备为基础，借助高速率、低时延、广连接的5G网络为患者提供实时、远程、高移动性、数字化的医疗服务，切实提高医疗效率与病情诊断的准确率，推动医疗资源下沉，解决我国医疗资源分布不均，居民看病难、看病贵、医疗效率低、质量差等问题。" },
            { id: 1233, text: "对比模型在训练集和测试集上的预测准确率，能够判断是否出现过拟合现象。", answer: true, explanation: "训练集用于训练模型，测试集用于评估模型的泛化能力。如果模型在训练集上的准确率明显高于测试集的准确率，通常表明模型发生了过拟合。" },
            { id: 1234, text: "GOMS 作为一种人机交互界面表示的理论模型，将所有任务都视为面向操作目标的，但它能够解决的问题本质以及用户间的个体差异存在局限。", answer: false, explanation: "GOMS是一种人机交互界面表示的理论模型，它把所有的任务都看作是面向操作目标的，但忽略了一些任务所要解决的问题本质以及用户间的个体差异。" },
            { id: 1235, text: "数据标注流程包括数据采集、数据清洗、数据标注、数据质检这几个步骤。", answer: true, explanation: "数据标注流程包括数据采集、数据清洗、数据标注、数据质检。" },
            { id: 1236, text: "空间复杂度的分析指标只关注算法运行过程中临时占用的存储空间大小。", answer: false, explanation: "空间复杂度分析指标不仅关注算法在运行过程中临时占用的存储空间大小，还包括算法本身所占用的存储空间和算法的输入输出数据所占用的存储空间。" },
            { id: 1237, text: "人机交互的第二阶段是语音识别和手势识别，此阶段的特点是用户能更自然地与计算机进行交互。", answer: false, explanation: "人机交互的发展可以分为几个阶段，其中最早的阶段是命令行界面，其特点是用户需要输入复杂的命令来与计算机交互。第二阶段是图形用户界面（GUI），它使用图形和图标来简化用户的操作，例如Windows操作系统。第三阶段是自然用户界面（NUI），它使用更加自然的交互方式，例如语音识别和手势识别。" },
            { id: 1238, text: "5W2H 模型又称 “七问分析法”，它以 5 个以 W 开头的英文单词和 2 个以 H结尾的英文单词为引导进行提问，通过提问来探寻答案。", answer: false, explanation: "5W2H模型又叫“七问分析法”，即以5个以W开头的英文单词和2个以H开头的英文单词为引子进行提问。" },
            { id: 1239, text: "LOTOS 模型对任务之间的时序约束关系进行了刻画。", answer: true, explanation: "LOTOS模型很好的描述了任务之间的时序约束关系，这些时序约束关系能更好的描述GOMS中子目标之间的关系。" },
            { id: 1240, text: "中文分词指的是把连贯的汉字序列转化为相应的词语序列，也能理解为在输入的序列里添加空格或其他边界标识的操作。", answer: true, explanation: "中文分词是将连续字序列转换为对应的词序列的过程，也可以看作在输入的序列中添加空格或其他边界标记的过程。" },
            { id: 1241, text: "PEST 模型常用于宏观环境分析，即从政治环境、经济环境、社会环境、技术环境这四个维度入手，分析对企业战略、课题选择、背景调查等产生影响的宏观因素，在各行业中都有应用。", answer: true, explanation: "PEST模型常用来分析宏观环境，一般是从政治环境、经济环境、社会环境、技术环境这四大类分析影响企业的主要外部环境因素，如企业战略、课题选择、背景调查等的宏观因素，在各行各业均有应用。" },
            { id: 1242, text: "对图像数据集进行数据增强时，务必要保留图像中与标签相对应的关键信息。", answer: true, explanation: "需要注意的是，在对图像类数据进行数据增强时，必须保留图像中与标签对应的关键信息。在分类问题中就是要保留图片所属类别对应的物体，即标记为汽车的图片在进行增强变换后，图片中必须仍然有汽车。" },
            { id: 1243, text: "AARRR 模型的五个阶段分别为获取（Acquisition）、激活（Activation）、留存（Retention）、收入（Revenue）和推荐（Referral）。", answer: true, explanation: "AARRR模型，也称为“海盗指标”，五个阶段分别是获取（Acquisition）、激活（Activation）、留存（Retention）、收入（Revenue）和推荐（Referral）。" },
            { id: 1244, text: "在 Excel 中，创建数据透视表的步骤是：在 “开始” 选项卡中点击 “数据透视表” 按钮，然后在弹出的对话框里，选择需要汇总的数据范围以及要创建透视表的位置。", answer: false, explanation: "Excel中，数据透视表创建是通过在\"插入\"选项卡中，点击\"数据透视表\"按钮。在弹出的对话框中，选择要汇总的数据范围和要创建透视表的位置。" },
            { id: 1245, text: "阈值化分割方法在实现上较为复杂，所需计算量较大，性能也不稳定，如今已很少被应用于图像分割领域。", answer: false, explanation: "阈值化分割是一种常用的、传统的图像分割方法，实现简单、计算量小、性能较稳定，目前在图像分割中已成为一种基本方法，得到了广泛的应用。" },
            { id: 1246, text: "按照所处理的数据类型及处理方式，计算机可分为数字电子计算机、模拟电子计算机、数字模拟混合式计算机三类。", answer: true, explanation: "从计算机中信息的表示形式和处理方式(原理)的角度来进行划分，计算机可分为三大类:数字电子计算机、模拟电子计算机、数字模拟混合式计算机。" },
            { id: 1247, text: "UAN 是以表格形式来呈现任务的。", answer: true, explanation: "UAN采用表格形式来表示任务，通常分为三列：用户行为、界面反馈和界面状态。" },
            { id: 1248, text: "只有当各个特征之间相互独立时，贝叶斯算法才能够适用。", answer: false, explanation: "朴素贝叶斯算法基于特征独立性的假设，但贝叶斯算法包括多种变体，可以处理不同类型的特征相关性。因此，贝叶斯算法不仅限于特征完全独立的情况。" },
            { id: 1249, text: "ETL 指的是把数据从来源端经过转译、上传到目标端的过程。", answer: false, explanation: "ETL是将数据从数据来源端经过抽取、转换、装载至目标端的过程。" },
            { id: 1250, text: "在数据存储中，文件存储、块存储和对象存储是最常用的几种数据存储方式。", answer: true, explanation: "数据存储中最常用的数据存储方式有文件存储、块存储和对象存储，每种存储方式针对不同的用途设计。" },
            { id: 1251, text: "若模型的训练时间过长，可能会在训练集上过度优化，进而导致过拟合。", answer: true, explanation: "训练时间过长确实可能导致过拟合，因为模型在训练过程中会开始过度拟合训练数据中的噪声和不重要的细节，而不仅仅是学习数据的基本模式。" },
            { id: 1252, text: "依托 5G 技术的智慧医疗，是在医院现有医护人员与医疗设施的基础上，促进医疗资源向高端化、精准化方向发展。", answer: false, explanation: "以5G为依托的智慧医疗，指的是以医院现有的人力资源和医疗设备为基础，借助高速率、低时延、广连接的5G网络为患者提供实时、远程、高移动性、数字化的医疗服务，切实提高医疗效率与病情诊断的准确率，推动医疗资源下沉。" },
            { id: 1253, text: "业务分析方法论是业务分析过程中的思维模式，当遇到特定业务问题时，运用合适的思维模式能帮助我们找到分析的突破口，引导整个分析任务朝着正确方向推进。", answer: true, explanation: "业务分析方法论是业务分析过程中的思维定式，当遇到特定业务问题时套用恰当的思维定式能够帮助我们找到分析业务问题的突破口，将整个分析任务引向正确方向。" },
            { id: 1254, text: "支持向量机的工作方式是在高维空间中找出超平面，让该超平面能最大程度区分不同类别的样本。", answer: true, explanation: "支持向量机（SVM）的工作原理是在高维空间中寻找一个超平面，使得该超平面可以最大化地将不同类别的样本分隔开。SVM通过最大化不同类别之间的间隔来实现最佳分类。" },
            { id: 1255, text: "网格搜索里的超参空间是由随机点组成的。", answer: false, explanation: "网格搜索是一种常见的超参数优化方法，它通过穷举搜索在预定义的超参数空间中的每一个可能的组合。与随机搜索不同，网格搜索的超参数空间是固定的，即所有的超参数组合在开始时就已经确定，并不是随机选择的。" },
            { id: 1256, text: "仅依据测试误差，就能判断算法是否存在欠拟合。", answer: false, explanation: "测试误差只能反映模型在新数据上的表现，并不能单独判断算法是否欠拟合。欠拟合通常表现为训练误差和测试误差都较高，这意味着模型无法有效学习训练数据中的规律。单独依赖测试误差无法判断欠拟合，因为它没有考虑模型在训练集上的表现。" },
            { id: 1257, text: "在 RFM 模型中，M 值指的是顾客在单位时间内的消费金额，它能反映出客户的消费能力。", answer: true, explanation: "M值直接反映了客户的消费金额，从而可以衡量客户的消费能力。消费金额越高的客户，通常意味着其消费能力越强，对企业的价值也越大。" },
            { id: 1258, text: "GOMS 模型的四种元素包括结果、操作、方法和选择规则。", answer: false, explanation: "GOMS模型它采用“分而治之”的思想，将一个任务进行多层次的细化，通过目标、操作、方法以及选择规则四个元素来描述用户行为。" },
            { id: 1259, text: "可用性评估只需在产品开发完成后做一次，无需持续开展。", answer: false, explanation: "可用性评估不仅仅是产品开发完成后的一个环节，它应该贯穿整个产品生命周期，在不同的阶段进行不同类型的评估。在不同阶段（如需求分析、设计、开发、发布后），可以采用不同的评估方法（如专家评审、用户测试等）来确保产品的可用性和用户体验。" },
            { id: 1260, text: "象限分析法是一种典型的策略驱动型思维。", answer: true, explanation: "象限分析法是指以两个或多个维度为坐标并划分出不同象限，不同象限表示不同的价值导向。象限分析法是典型的策略驱动思维，常见于市场分析、产品分析、客户管理等。" },
            { id: 1261, text: "基于词频统计的分词方式无需依赖切分词典。", answer: true, explanation: "基于词频统计的分词方法只需要对语料中的字组频度进行统计，不需要切分词典，因而又叫作无词典分词法或统计分词方法。" },
            { id: 1262, text: "眼动跟踪技术能够通过追踪用户的眼球运动，来判断其注意力的集中之处，常被应用于用户行为分析和界面优化工作中。", answer: true, explanation: "眼动跟踪技术通过传感器（如红外传感器）追踪用户的眼球运动，能够精准判断用户的注意力集中点，进而分析其行为和反应。该技术在用户体验研究、界面设计优化、广告效果分析等领域得到广泛应用。" },
            { id: 1263, text: "若已获得作品著作权人和原作品著作权人的许可，其他人便可对改编、翻译、注释、整理、汇编已有作品而形成的新作品进行出版、演出及制作录音录像制品。", answer: false, explanation: "《中华人民共和国著作权法》第十六条规定，使用改编、翻译、注释、整理、汇编已有作品而产生的作品进行出版、演出和制作录音录像制品，应当取得该作品的著作权人和原作品的著作权人许可，并支付报酬。" },
            { id: 1264, text: "对比分析作为一种数据分析方法，其用意是找出不同数据集或数据点之间的相同之处。", answer: false, explanation: "对比分析是数据分析中常用的分析方法之一，是将两个或两个以上具有可比性的数据进行比较，分析其中差异，以揭示事物发展规律。" },
            { id: 1265, text: "随机森林算法能够用于对大规模数据集进行训练和分类操作。", answer: true, explanation: "随机森林算法具有处理大规模数据集的能力，特别是在数据具有高维度时，通过随机特征选择和集成多棵树进行预测，有助于提高模型的准确性，对于极大规模的数据集，可以借助分布式计算以提高效率。" },
            { id: 1266, text: "忠诚负责、高效执行、严守秘密、尊重他人、坚持学习与自我提升，均属于恪尽职守的基本要求。", answer: true, explanation: "恪尽职守的基本要求包括忠诚和责任、高效执行、保守秘密、尊重他人、持续学习和提升。" },
            { id: 1267, text: "采用 K 近邻算法时，k 值的选择不会对分类结果造成影响。", answer: false, explanation: "K近邻算法的预测结果受到K值选择的显著影响。较小的K值可能导致模型过拟合，泛化能力差；较大的K值则可能导致欠拟合，不能很好地捕捉数据的复杂性。因此，K值的选择对于模型性能至关重要。" },
            { id: 1268, text: "在 PowerPoint 中，点击 “动画效果” 组的 “可动窗格” 按钮，右侧会显示所有动画内容，点击删除按钮就能删掉不需要的动画效果。", answer: false, explanation: "PowerPoint中单击“动画”选项卡-“高级动画”组的“动画窗格”按钮可以在右侧呈现所有动画内容，通过单击删除按钮来删除不需要的动画效果。" },
            { id: 1269, text: "DB 指标达到最大值时对应的类别数 k，被认为是最优类别数。", answer: false, explanation: "DB指标实际上是关于同一类中样本的紧密程度与不同簇之间样本分散程度的一个函数，从几何学的角度，使族内样本间距最小而簇间样本距离最大的分类应该是最佳的分类结果因此使DB最小化的类别数k被认为是最优类别数。" },
            { id: 1270, text: "对标注数据开展的审核工作，能够对审核过程中找出的错误进行改正。", answer: true, explanation: "标注数据审核能够对审核过程中发现的错误进行纠正。" },
            { id: 1271, text: "人体动作分析是人机交互系统的重要支撑技术。", answer: true, explanation: "人体动作分析是人机交互系统的重要支撑技术，是一个多学科交叉的研究课题，使用了数学建模、图形图像分析、模式识别及人工智能等知识，具有重要的理论研究价值。" },
            { id: 1272, text: "自助法的基本思想是，通过有放回地抽取样本以生成新的训练集，从而进行模型评估。", answer: true, explanation: "自助法的基本思想是通过有放回地从原始样本中抽取样本，生成与原始样本规模相等的自助样本。自助法可以用于模型训练、评估、验证等任务。" },
            { id: 1273, text: "系统化改造法以现有的流程为应用基础，通过对现有流程进行整合、碎片化、手动改造等方式对其重新设计。", answer: false, explanation: "系统化改造法的应用基础是现有的流程，通过对现有流程进行整合、简化、自动化改造等方法对其进行重新设计。" },
            { id: 1274, text: "按照职业道德的规范，从业者需持续提高自身的业务能力与专业修养，为所在机构提供优质服务，这不仅有利于塑造个人及机构的良好形象，还能为个人的职业成长与事业成功打下坚实根基。", answer: true, explanation: "根据职业道德要求，从业人员可以不断提升自己的工作水平和专业素养，为组织提供高质量的服务。这有助于树立良好的个人和组织形象，同时也为个人的职业发展和成功奠定基础。" },
            { id: 1275, text: "人机交互是人类用户与计算机系统之间进行信息传递的媒介或方式，涵盖了支持人机双向信息交换的软件与硬件。", answer: false, explanation: "人机交互和人机界面是两个不同的概念。人机交互是指用户与计算机系统之间的通信，是人与计算机之间各种符号和动作的双向信息交换。人机界面是指人类用户与计算机系统之间的通信媒体或手段，是支持人机双向信息交换的软件和硬件。" },
            { id: 1276, text: "交互产品的设计必须围绕用户展开，要全面考虑用户在体验水平、年龄、文化以及健康状况等方面存在的差异。", answer: true, explanation: "以用户为中心的设计强调根据用户的需求、特征和差异化的使用情境来设计产品。设计时考虑到用户的体验水平、年龄、文化背景和健康状况等，能够提高产品的可用性和用户的满意度。" },
            { id: 1277, text: "基于字典匹配的分词方式是依照一定的匹配规则，把输入的字符串和机器字典中的词条进行比对匹配。", answer: true, explanation: "基于字典匹配的分词方法按照一定的匹配策略将输入的字符串与机器字典词条进行匹配，实际上就是把一个句子从左向右扫描一遍，遇到字典中有的词就标识出来，遇到复合词就找到最长的词匹配，遇到不认识的字串则切分成单个词。" },
            { id: 1278, text: "RFM 模型是一种基于客户购买成果的方法，它较为动态地展示了客户的大部分形象，为个性化沟通和服务提供了依据。", answer: false, explanation: "RFM模型是一种基于客户行为细分的方法，RFM模型较为动态地显示了一个客户的全部轮廓，这对个性化的沟通和服务提供了依据。" },
            { id: 1279, text: "学习文本语义的向量化表示是机器处理自然语言的首要步骤，其性能好坏会直接对下游任务的效果产生影响。", answer: true, explanation: "文本语义向量化表示的学习是机器处理自然语言的第一步，其性能的优劣会直接影响下游任务的效果。鉴于此，如何学习高质量的文本语义向量化表示成为自然语言处理领域重要的基础研究课题。" },
            { id: 1280, text: "构建神经网络模型时，其算法可以灵活地将各种基础数学运算与非线性激活函数组合起来。", answer: true, explanation: "神经网络算法通过多层结构将输入数据矩阵传递并逐层处理。每一层通常包括一些基本的数学操作（如加法、乘法等）和非线性激活函数（如ReLU、Sigmoid、Tanh等）。这些操作的灵活组合使得神经网络能够学习到复杂的非线性关系。" },
            { id: 1281, text: "进行图像分割时，区域生长法会先选定一个种子点，之后不断扩大区域范围，直至所有像素都符合某一相似性标准。", answer: true, explanation: "区域生长法是通过从种子点开始，依据像素的相似性（如灰度值、颜色、纹理等）逐步扩展相邻区域，直到达到预定的停止准则。" },
            { id: 1282, text: "所谓算法的空间复杂度，指的是算法在执行过程中所占用的辅助存储空间的大小。", answer: true, explanation: "算法空间复杂度指算法在执行过程中所占辅助存储空间的大小。" },
            { id: 1283, text: "自动语言识别领域中，最常用的两种语音处理方法是梅尔滤波器组和布尔频率系数。", answer: false, explanation: "自动语言识别领域中最常用的两种语音处理方法：梅尔滤波器组和梅尔频率倒谱系数。" },
            { id: 1284, text: "利用数据增强技术，从已有的训练集中衍生出更多数据样本，以此增加训练集样本数量，可以防止深度学习模型出现过拟合。", answer: true, explanation: "通过数据增强技术，可以从现有的训练集衍生出更多的数据样本，增强训练数据集的多样性，从而帮助模型更好地泛化，减少过拟合的风险。数据增强包括图像的旋转、裁剪、平移、缩放、翻转等方法，能够在不增加过多计算成本的情况下生成更多样化的数据样本。" },
            { id: 1285, text: "智慧校园平台利用新一代信息技术手段，整合学校各类应用系统和资源，形成一个有机整体，构建具备高度感知能力、协同能力和服务能力的新型信息化校园环境。", answer: true, explanation: "智慧校园平台基于新一代信息技术手段，将学校各类应用系统和资源整合为一个有机整体，构建具有高度感知能力、协同能力和服务能力的新型信息化校园环境，实现基于动态数据分析的教学与管理决策，为智慧教学、智慧管理和智慧生活提供技术支撑，促进学生和教师的智慧发展。" },
            { id: 1286, text: "熟练型用户处于新手用户和专家型用户这两个群体之间。", answer: true, explanation: "熟练型用户已经掌握了产品的基本操作，能够高效使用它，但在某些高级功能上可能不如专家型用户熟悉。因此，熟练型用户处于新手与专家之间的过渡阶段。" },
            { id: 1287, text: "数据增强的原理是通过对原始图像进行变换或合成，生成新的训练数据，以此来扩充数据集。", answer: true, explanation: "数据增强技术通过对原始图像进行变换或合成，生成新的训练数据。其主要目的是扩充数据集，使模型能够学习到更多的不变性，增强模型的泛化能力，同时减少过拟合的风险。" },
            { id: 1288, text: "采用计算机视觉、人脸识别、物联网等新技术打造的新型无人零售店，具备 “拿了就走” 等自助支付功能。", answer: true, explanation: "在计算机视觉、人脸识别、物联网等新技术的推动下，诞生了以AmazonGo为代表的新型无人零售店，通过“拿了就走”等自助支付手段，为消费者提供新的用户体验，也为商家节约人力成本。" },
            { id: 1289, text: "在 PowerPoint 中，在左侧缩略图窗格中选中 “幻灯片母版”，该幻灯片包含了应用于当前幻灯片的共享元素和属性，像背景颜色、图像、标志、页脚等。", answer: false, explanation: "在 PowerPoint 中，通过点击 “视图” 选项卡中的 “幻灯片母版” 进入母版视图后，可以设置所有幻灯片的共享元素和属性，例如背景、图像、标志、页脚等。更改幻灯片母版后，所有应用该母版的幻灯片都会自动更新，以保持一致的格式和设计。" },
            { id: 1290, text: "职业道德是社会道德体系的重要组成部分，它既具备社会道德的一般作用，又有着自身的特殊作用。", answer: true, explanation: "职业道德是社会道德体系的重要组成部分，它一方面具有社会道德的一般作用，另一方面它又具有自身的特殊作用。" },
            { id: 1291, text: "在 K 近邻法中，较高的 k 值会引发欠拟合问题。", answer: true, explanation: "当k值较大时，模型的整体复杂度降低，对异常值的敏感度也降低，这可能导致模型无法充分学习训练数据中的模式和规律，从而出现欠拟合。" },
            { id: 1292, text: "企业培训管理的初级阶段，是从无到有逐步建立的阶段。", answer: true, explanation: "培训管理初级阶段是企业培训管理从无到有的阶段。" },
            { id: 1293, text: "异常值会使数据分析的结果出现偏差。", answer: true, explanation: "异常值处理是数据清洗过程中的一个环节，异常值会导致数据分析结果的不准确，因此需要对异常数据进行清洗。" },
            { id: 1294, text: "职业道德具有职业性、阶段性、实践性、继承性和多样性这些特征。", answer: false, explanation: "职业道德特征包括职业性、继承性、实践性、多样性。" },
            { id: 1295, text: "一般而言，图形用户界面的设计需要对特定时刻下可见且可操作的控件数量加以调控。", answer: true, explanation: "一般图形用户界面（GUI）设计应该控制某一时刻可见和可用的控件的数量；根据应用，要控制所有控件的取值范围；数字控件要设定数据范围属性；如果可能，用枚举或者下拉列表替代字符串输入。" },
            { id: 1296, text: "开展交叉验证工作时，不必保持数据分布的一致性，这是由于各个子集均为随机划分而成。", answer: false, explanation: "在交叉验证中，数据集的划分方式至关重要，尤其是在类别不平衡的情况下。为了确保模型评估的公平性和可靠性，通常需要保持每个子集的类别分布与整体数据集一致。这可以通过分层交叉验证来实现，确保每个子集中的类别分布与原始数据集相同，从而避免数据划分不均导致模型评估不准确的问题。" },
            { id: 1297, text: "在体现 “选择” 关系的状态转换网络中，状态 S1 和状态 S2 是借助外部事件直接实现转换的。", answer: false, explanation: "根据“选择”关系的状态转换网络，状态 S1 和状态 S2 并没有直接的转换关系。它们分别是由初始状态 S0 通过外部事件0 和外部事件1 进入的，状态之间的转换是通过 S0 进行的，而不是彼此直接转换。" },
            { id: 1298, text: "人机交互发展的最初阶段，主要是通过命令行界面来实现的。", answer: true, explanation: "人机交互最早的阶段是命令行界面，其特点是用户需要输入复杂的命令来与计算机交互。" },
            { id: 1299, text: "VR 设备属于综合类交互设备，通常配备高精度的动作捕捉技术，能够实时捕捉用户的动作和视线方向，并将其转化为虚拟环境中的对应操作。", answer: true, explanation: "综合交互设备包括虚拟现实（VR）设备、增强现实（AR）设备、三维鼠标和数据手套等。其中，虚拟现实（VR）设备是一种能够创建虚拟环境并提供沉浸式三维体验的设备，它通常配备有高精度的动作捕捉技术（如头部追踪、眼球追踪等），能够实时捕捉用户的动作和视线方向，并将其转化为虚拟环境中的相应操作。" },
            { id: 1300, text: "在 Word 中插入目录时，先把光标移到想要插入目录的位置，再在菜单栏的 “工具栏” 选项卡中选择合适的样式，Word 就会生成包含章节标题和页码的目录。", answer: false, explanation: "在word中插入目录，先将光标放在希望插入目录的位置，在菜单栏中选择“引用”选项卡，点击“目录”按钮，在下拉菜单中选择适当的样式，Word将生成一个包含章节标题和页码的目录。" },
            { id: 1301, text: "业务流程重组（BPR）的成功实施主要依靠信息技术（IT）的应用，而不是管理上的创新。", answer: false, explanation: "业务流程重组（BPR）的核心是一种管理创新，而不是单纯依赖信息技术（IT）。虽然IT在BPR的实施中起到了催化剂的作用，但BPR的本质是思维方式的转变和管理创新。" },
            { id: 1302, text: "在智慧农业发展的成熟阶段，应用场景日益增多，产生的海量数据需要存储和处理，此时需要引入物联网技术架构来构建智慧农业系统。", answer: false, explanation: "随着农业信息化的深入，智慧农业应用逐渐增多，会产生海量的数据需要保存和处理，而且初期的传统系统架构可能不能满足日益增加的用户和功能的需求。因此，在智慧农业的发展阶段，需要引入云计算技术架构来构建智慧农业系统。" },
            { id: 1303, text: "凭借 5G 网络高速率、大连接的优势，能够实现多车路之间的互联互通，从而构建起可随时通信、实时监控、即时决策的智慧交通网络。", answer: true, explanation: "5G作为新一代通信技术，对智慧交通的发展起到强大的推动作用。5G网络依托高速率、大连接的特性，连接车、路、人、云等对象，形成一张可随时通信、实时监控、即时决策的智慧交通网络。" },
            { id: 1304, text: "SWOT 模型从优势、劣势、机会、威胁这 4 个角度对企业现状展开分析，并对未来进行预测。", answer: true, explanation: "SWOT模型从优势、劣势、机会、威胁4个方面对企业的现状进行分析，同时对未来加以预测。" },
            { id: 1305, text: "HBase 属于非关系数据库的一种。", answer: true, explanation: "ApacheHBase是一个开源、分布式、版本化的非关系数据库。" },
            { id: 1306, text: "区域生长法的做法是从单个像素开始，逐步将周围的像素合并进来。", answer: true, explanation: "基于区域的图像分割方法主要包括区域生长和区域分裂与合并两种典型的方法。区域生长法从一个初始像素出发，通过比较周围像素的相似性，逐渐合并相邻像素，直到形成一个一致性较强的区域，进而完成图像的分割。" },
            { id: 1307, text: "企业进行业务流程优化时，无需参考国内外成功企业的管理经验，只需根据自身情况就能完成优化。", answer: false, explanation: "根据业务流程优化的思路，企业需要借鉴国内外成功的企业管理经验，结合自身的业务特点及发展战略，才能更好地进行优化。" },
            { id: 1308, text: "决策树无法对连续变量进行处理。", answer: false, explanation: "决策树能够处理离散和连续变量。在处理连续变量时，决策树会选择一个阈值来将数据分割成两部分，从而进行进一步的分裂。" },
            { id: 1309, text: "ETL 工具不具备增量数据抽取的能力，每次都必须全量抽取所有数据。", answer: false, explanation: "ETL工具支持增量抽取（仅处理新增或变化的数据），以提高效率。" },
            { id: 1310, text: "业务流程重组（BPR）属于渐进式改进方法，其主要做法是对现有流程进行小范围调整，以此提升企业性能。", answer: false, explanation: "业务流程重组（BPR）是对企业进行根本的再思考和彻底的再设计，强调革命性的变革，而不是渐进式的改进。" },
            { id: 1311, text: "中值滤波方法可用于去除椒盐噪声。", answer: true, explanation: "中值滤波的主要优点是对脉冲干扰和椒盐噪声的抑制效果好，在抑制随机噪声的同时能有效保护边缘少变模糊。" },
            { id: 1312, text: "进行词性标注时，可以调用 jieba.posseg 模块的 cut () 函数来实现。", answer: true, explanation: "Jieba分词库支持对分词结果进行词性标注，其对于句法分析、实体识别等后续任务具有重要意义。可以调用jieba.posseg模块的cut()函数进行词性标注。" },
            { id: 1313, text: "硬件系统是计算机系统的物质根基，而软件系统则是计算机发挥功能必不可少的保障。", answer: true, explanation: "硬件系统是计算机系统的物质基础，软件系统是计算机发挥功能的必要保证。" },
            { id: 1314, text: "行业对比、竞品对比、与自身的同比、环比等，都属于常见的对比分析方法。", answer: true, explanation: "对比分析法是指确定对比对象和对比维度，对目标事物和对比事物进行比较，常见的有行业对比、竞品对比、与自身同比、环比等。" },
            { id: 1315, text: "业务流程重组（BPR）能否成功实施，主要取决于内部运营效率的提高，和客户是否参与没有关系。", answer: false, explanation: "流程重组离不开客户的参与。因此，客户参与是BPR成功实施的重要因素之一。" },
            { id: 1316, text: "逻辑回归算法是直接利用线性回归模型的输出值来进行分类的。", answer: false, explanation: "逻辑回归算法本质上是通过将线性回归模型的输出值（一个实数）传递给sigmoid函数（也称为逻辑函数），将其压缩到0到1之间。这个值可以被解释为样本属于某一类别的概率。因此，逻辑回归并不直接使用线性回归的输出值进行分类，而是通过sigmoid函数将其转化为概率值来进行分类。" },
            { id: 1317, text: "当多名数据标注员共同对同一份文本进行标注时，指导中级工作人员解决这类数据标注问题，可采用交叉标注的方式。", answer: true, explanation: "标注数据不一致是文本标注最主要的问题，严重影响文本质量,当有多个数据标注员对同一个文本进行标注时，可以采取交叉标注的方式。" },
            { id: 1318, text: "文本向量化模型可应用于自然语言处理相关任务。", answer: true, explanation: "文本向量化模型可以用于自然语言处理任务，如情感分析、文本分类和主题建模等。" },
            { id: 1319, text: "趋势分析是对比不同时期同一指标的数值，以明确时间动态数列增减变动趋势的分析方法。", answer: true, explanation: "趋势分析是将不同时期同一指标的数值进行对比，以确定时间动态数列增减变动趋势的分析方法。" },
            { id: 1320, text: "中值滤波的去噪效果与图像的局部特征及邻域窗口的尺寸有关。", answer: true, explanation: "中值滤波的去噪效果依赖于图像的局部特征和邻域窗口的尺寸若窗口过小则排序结果易受到噪声影响,而窗口过大会造成去噪后的图像边缘变得模糊。" },
            { id: 1321, text: "图像数据处理是借助图像去噪、图形分割、图像数据增强等手段，根据需求对图像数据进行处理的技术。", answer: true, explanation: "图像数据处理是利用图像数据去噪、图形分割、图像数据增强等手段根据需求对图像数据进行处理的技术。" },
            { id: 1322, text: "初级培训的内容包括引导新员工依据各自岗位的差异，分别学习与所在岗位相关的业务知识、工作流程、工作要求以及操作要点。", answer: true, explanation: "初级培训通常针对新员工或转岗员工，旨在使他们了解公司的基本情况、规章制度、产品知识和业务流程等。这种培训通常包括公司文化、团队合作、沟通技巧和安全意识等方面的内容。初级培训的目的是帮助员工快速适应工作环境，提高工作绩效和效率。初级培训包括根据各人的不同岗位，分类学习与其岗位有关的业务知识、工作流程、工作要求及操作要领。" },
            { id: 1323, text: "可用性是指产品是否能够引起用户的关注，并且让用户产生使用它的念头。", answer: false, explanation: "吸引用户的注意力和让用户愿意使用产品是“吸引力”这个方面的描述，而可用性更广泛地包括了用户在使用产品时的效力、效率、满意度等。吸引力只是其中的一部分，并不等于可用性本身。" },
            { id: 1324, text: "k 折交叉验证在数据划分阶段运用不放回抽样技术，保证每个样本仅充当一次测试集，不过在训练阶段，同一样本可能会被多次使用。", answer: true, explanation: "k折交叉验证将数据集划分为k个子集，每次使用k-1个子集训练模型，剩下的一个子集用于测试。每个子集都会轮流作为测试集，而且每个样本仅在一个测试集中出现一次，因此不会重复抽取数据点进行测试，这符合不放回抽样的定义。所以，k折交叉验证属于不放回抽样技术。" },
            { id: 1325, text: "GOMS 是交互系统中用于分析用户操作复杂性的建模技术，主要在软件设计领域被用于构建用户行为模型。", answer: true, explanation: "GOMS模型是人机交互领域最著名的预测模型，是用于分析交互系统中用户复杂性的建模技术，主要被软件设计者用于建立用户行为模型。" },
            { id: 1326, text: "调整模型的容量（capacity），能够控制模型是否倾向于过拟合或欠拟合。", answer: true, explanation: "模型的容量是指其拟合函数的能力。一般来说，较大的模型容量容易拟合训练数据中的噪声，导致过拟合；而较小的模型容量可能无法充分学习数据的规律，导致欠拟合。通过调整模型的容量，可以在一定程度上控制过拟合和欠拟合之间的平衡。" },
            { id: 1327, text: "在包裹式特征选择方法中，特征选择的过程是依据训练模型的性能来进行的。", answer: true, explanation: "包裹式特征选择（Wrapper Method）是一种依赖于机器学习模型的特征选择方法。在该方法中，通过训练不同的特征子集的模型，并根据模型的性能来评估和选择特征。具体来说，包裹式方法会多次训练模型，每次选择一个特征子集，选择出能够提升模型性能的特征。常见的包裹式方法包括递归特征消除（RFE）等。因此，该方法的核心是基于模型的性能进行特征选择。" },
            { id: 1328, text: "自动语言识别领域中，仅有一种语音处理方法，即梅尔滤波器组。", answer: false, explanation: "自动语言识别领域中最常用的两种语音处理方法：梅尔滤波器组和梅尔频率倒谱系数。" },
            { id: 1329, text: "用人单位禁止招用未满十八周岁的未成年人，其中也包含文艺、体育和特种工艺单位。", answer: false, explanation: "根据《中华人民共和国劳动法》第十五条规定，禁止用人单位招用未满十六周岁的未成年人。文艺、体育和特种工艺单位招用未满十六周岁的未成年人，必须依照国家有关规定，履行审批手续，并保障其接受义务教育的权利。" },
            { id: 1330, text: "决策树能够同时应对分类问题和回归问题。", answer: true, explanation: "决策树能够处理离散和连续变量，也能处理分类和回归问题。" },
            { id: 1331, text: "依据职业道德的规范，从业人员有义务尊重他人的权利与尊严，做到不歧视、不欺压他人。", answer: true, explanation: "根据职业道德的要求，从业人员要尊重他人的权利和尊严，不歧视、不欺压他人。" },
            { id: 1332, text: "确定培训目标时，要防止与组织的长远目标相冲突。", answer: true, explanation: "一个好的培训目标会通过指导员工进行精力、注意力的分配激励其为达到目标而进行战略开发来影响员工的行为方式，从而激发其高水平的培训绩效。在确立培训目标时就应注意要和组织长远目标相符合。" },
            { id: 1333, text: "依据模型的泛化能力，可以判断其是否存在过拟合问题。", answer: true, explanation: "模型过度拟合训练集中的数据会导致丧失了泛化能力。" },
            { id: 1334, text: "业务流程优化就是对管理体系进行再造或优化，在这一过程中，企业的战略定位和战略思想必然会发生变化，因此，企业可以通过业务流程优化来完善自身的管理体系。", answer: true, explanation: "从本质上来讲，业务流程优化就是管理体系的再造或者优化，业务流程优化的过程中势必存在企业战略定位及战略思想的变化，因此，企业可以借助业务流程优化来改进企业的管理体系。" },
            { id: 1335, text: "R 方值越接近 1，表明回归模型的预测误差就越小。", answer: true, explanation: "R方值是衡量回归模型拟合优度的指标，表示自变量对因变量的解释程度。R方值越接近1，表示模型能够更好地解释因变量的变化，预测效果越好，预测误差相对较小。" },
            { id: 1336, text: "在 Word 中进行邮件合并时，需要在 “工具” 选项卡中点击 “开始邮件合并” 按钮，然后在下拉菜单里选择 “电子邮件”。", answer: false, explanation: "在Word中进行邮件合并时，需在“邮件”选项卡中的“开始邮件合并”组，点击“开始邮件合并”按钮，在下拉菜单中，选择“电子邮件”。" },
            { id: 1337, text: "图像处理是运用计算机算法对图像进行分析和操作的处理技术。", answer: true, explanation: "图像处理可以简单地定义为利用计算机算法（通过代码）对图像进行分析、操作的处理技术。" },
            { id: 1338, text: "数据标注流程包含数据采集、数据清洗、数据标注、数据提示这几个环节。", answer: false, explanation: "数据标注流程包括数据采集、数据清洗、数据标注、数据质检。" },
            { id: 1339, text: "PEST 模型常用于微观环境分析，分析对企业决策、课题选择、背景调查等产生影响的微观因素，在各行业中都有应用。", answer: false, explanation: "PEST模型常用来分析宏观环境，即从政治环境、经济环境、社会环境、技术环境这4个部分出发，分析影响企业的主要外部环境因素。" },
            { id: 1340, text: "在 Word 中进行邮件合并时，导入数据源文件之前，要先保证第一行包含每一列的字段名称，且字段名称可以重复。", answer: false, explanation: "在Word中进行邮件合并时，导入数据源文件之前应该先确保第一行应包含字段名称的每一列，例如，标题、 称呼、 名字、 中间名、 姓、 地址 1 和地址 每个字段名称应该是唯一的。每一行应提供有关特定项目的信息。" },
            { id: 1341, text: "输入设备是向计算机系统输送信息的设备，像键盘、鼠标、摄像头、扫描仪等都属于此类。", answer: true, explanation: "输人设备指向计算机系统提供信息输人的设备。现有计算机系统的输人设备主要有键盘、鼠标、触摸屏、摄像头、光笔和扫描仪等。" },
            { id: 1342, text: "眼动追踪技术可用于评估用户对界面元素的注意力分配情况，但它并非一种直接的人机交互手段。", answer: false, explanation: "眼动追踪技术不仅可以用于评估用户对界面元素的注意力分布，它也可以作为一种直接的人机交互方式，允许用户通过眼睛的移动来控制设备或选择界面元素。" },
            { id: 1343, text: "选择的窗函数和窗宽不一样，对短时傅里叶谱的影响也不一样。", answer: true, explanation: "选择的窗函数和窗宽的不同，对短时傅里叶谱的影响是不同的。在矩形窗和汉明窗两种窗函数下，短时频谱图都有两种变化:由周期性激励引起的快变化，反映了基音频率的各次谐波;由声道的共振特性引起的慢变化，反映了各共振峰的频率和带宽。" },
            { id: 1344, text: "UAN 模型会运用预先定义的符号标识符来对用户的行为加以描述。", answer: true, explanation: "UAN使用了预定义的符号（标识符）来表示用户的行为，比如常见的 move_mouse(x, y)、highlight(icon) 等动作符号。" },
            { id: 1345, text: "有监督图像去噪方法通常会依靠精心设计的网络架构和高质量的图像去噪数据集。", answer: true, explanation: "有监督图像去噪方法通常借助精心设计的网络架构和高质量图像去噪数据集。" },
            { id: 1346, text: "进行 K 折交叉验证时，需将数据集分成 k 个子集，每次用其中一个子集作为测试集，剩下的子集则作为训练集。", answer: true, explanation: "交叉验证法是一种比较常用的方法，交叉验证的步骤如下：（1）首先将数据集划分为k个不相交的子集；（2）每次取出一个子集作为测试集，剩余的k-1个子集作为训练集，重复进行k次；（3）最后对所有测试集的性能取平均值。" },
            { id: 1347, text: "Jieba 分词库仅能用于情感分析。", answer: false, explanation: "Jieba 分词库可以帮助实现文本分类、 情感分析、 文本聚类等任务。" },
            { id: 1348, text: "LOTOS 包含两个部分，第一部分基于进程代数 CCS，对进程的行为及相互作用进行描述；第二部分基于抽象数据类型语言 ACT-ONE，对数据结构和值表达式进行描述。", answer: true, explanation: "LOTOS包括两个部分，第一部分基于进程代数CCS，描述进程的行为和相互作用，第二部分基于抽象数据类型语言ACT-ONE，描述数据结构和值表达式。" },
            { id: 1349, text: "随机森林算法是一种以决策树为基础的集成学习算法。", answer: true, explanation: "随机森林算法是一种集成学习方法，它基于多棵决策树的集成来进行分类或回归。在每棵决策树的训练过程中，采用行方向的随机采样和列方向的特征子集随机选择。最后，随机森林通过集成多个决策树的输出结果，来提高模型的准确性和泛化能力，常见的集成方法有投票法（分类）和平均法（回归）。" },
            { id: 1350, text: "个人信息处理者对敏感个人信息进行处理时，无需开展个人信息保护影响评估。", answer: false, explanation: "根据《中华人民共和国个人信息保护法》第五十五条规定，有下列情形之一的，个人信息处理者应当事前进行个人信息保护影响评估，并对处理情况进行记录：（一）处理敏感个人信息；（二）利用个人信息进行自动化决策；（三）委托处理个人信息、向其他个人信息处理者提供个人信息、公开个人信息；（四）向境外提供个人信息；（五）其他对个人权益有重大影响的个人信息处理活动。" },
            { id: 1351, text: "数据库管理系统只负责数据的存储，而数据的增删改查操作则完全依靠外部应用程序来实现。", answer: false, explanation: "DBMS的核心功能之一是直接提供数据操作能力，包括数据的插入、删除、修改和查询，无需依赖外部应用程序直接处理底层数据。" },
            { id: 1352, text: "图形数据库是利用表结构（行和列）来存储数据的。", answer: false, explanation: "图形数据库以节点（实体）和边（关系）的模型存储数据，而非传统表结构。表结构是关系型数据库（如MySQL）的特征。" },
            { id: 1353, text: "多点触控作为人机交互的一项新技术，它允许单个用户用一根手指同时发送输入信号，并能根据动态手势做出即时响应。", answer: false, explanation: "多点触控技术是一种允许多用户、多手指同时传输输入信号，并根据动态手势进行实时响应的新型交互技术。" },
            { id: 1354, text: "从业人员不断优化自身的工作方式与流程，积极探寻更优的解决办法，这一行为体现了追求卓越中的持续改进。", answer: true, explanation: "从业人员持续改进自己的工作方法和流程，寻找更好的解决方案，这个行为体现的是“持续改进”。" },
            { id: 1355, text: "自底向上的策略是先将每个对象单独作为一个簇，再把这些原子簇逐步合并成更大的簇，直到所有对象都归入同一个簇，或者满足了某个终止条件。", answer: true, explanation: "在实际应用中一般有两种类型的层次聚类方法，分别是自底向上的凝聚层次聚类算法和自顶向下的分裂层次聚类算法。(1)自底向上的策略首先将每个对象作为一个簇，然后合并这些原子簇为越来越大的簇，直到所有的对象都在一个簇中，或者达到了某个终止条件。绝大多数的层次聚类方法都属于这一类，只是在簇间相似度的定义上有所不同。(2)自顶向下的分裂层次聚类算法。这种自顶向下的策略与凝聚层次聚类相反，它首先将所有对象置于一个簇中，然后逐渐细分为越来越小的簇，直到每个对象自成一簇，或者达到了某个终止条件。" },
            { id: 1356, text: "象限分析法指的是借助两个或多个维度作为坐标，进而划分出不同的象限。", answer: true, explanation: "象限分析法是指以两个或多个维度为坐标并划分出不同象限，不同象限表示不同的价值导向。象限分析法是典型的策略驱动思维，常见于市场分析、产品分析、客户管理等。" },
            { id: 1357, text: "全新设计法是依据流程优化目标，彻底摒弃原有流程，从零开始设计新流程。", answer: true, explanation: "全新设计法就是根据流程优化目标，彻底颠覆原有流程，从零开始对新流程进行设计。" },
            { id: 1358, text: "各个培训阶段的流程毫无区别，完全一致，区别仅在于培训内容的深浅程度不同。", answer: false, explanation: "在企业培训管理的不同阶段，工作的重点、培训起到的作用、做好培训管理工作的关键点以及考核培训管理成果的指标都是不同的。" },
            { id: 1359, text: "运用PLP 技术处理后的语音频谱，考虑到了人耳的听觉特性。", answer: true, explanation: "PLP（Perceptual Linear Prediction）技术是一种模仿人类听觉系统的语音处理方法。在PLP技术中，语音信号的频谱经过处理，以更好地反映人耳对不同频率的感知特性。PLP技术通过模拟人耳的频率选择性，考虑到人耳对低频的高敏感度和对高频的低敏感度，从而提高语音信号的处理效果。" },
            { id: 1360, text: "利用 jieba 分词库进行情感分析时，无需对原始文本数据做预处理。", answer: false, explanation: "使用Jieba分词库进行情感分析首先需要对原始文本数据进行预处理，包括去除停用词、特殊符号等。" },
            { id: 1361, text: "短时自相关函数可被用来计算语音信号所具有的周期性特征。", answer: true, explanation: "短时自相关函数是语音信号处理中常用于计算信号周期性特征的一种方法。它通过计算信号与自身的延迟版本之间的相关性，能够揭示信号的周期性变化。尤其在音高估计、语音活动检测等任务中，短时自相关函数广泛应用于语音信号的时域分析。" },
            { id: 1362, text: "从业人员只要遵循 “遵章守法” 的基本要求，就能确保自身行为合法合规，同时维护好个人的职业形象。", answer: true, explanation: "通过遵守\"遵章守法\"的基本要求，从业人员可以保证自己的行为合法合规，并维护职业的声誉和信誉。这有助于建立良好的社会形象，同时也为个人和组织带来可持续的发展和成功。" },
            { id: 1363, text: "不少复杂问题仅依靠人工智能等自动化技术，就能得到精准且高效的处理结果。", answer: false, explanation: "随着数量庞大的知识与信息的产生，许多复杂的问题单纯依靠人工智能等自动化技术很难获得精确且高效的处理结果，往往需要借助于人机协同和交互来实现最终的目标。" },
            { id: 1364, text: "语音编码是通过降低语音信号中的信息冗余度来实现数据压缩的。", answer: true, explanation: "语音编码就是通过减少语音信号中的信息冗余度来实现数据压缩，这种冗余度的最直接的证据，就是语音采样信号之间具有很强的相关性。" },
            { id: 1365, text: "在数据整合的过程里，数据转换工作必须在数据加载到目标系统之后才进行。", answer: false, explanation: "数据转换是加载前的必要步骤。若先加载原始数据再转换，会导致目标系统中存储大量无效或冗余数据，增加后续处理成本。" },
            { id: 1366, text: "在运用交叉验证时，通常而言，测试集中的数据与训练集中的数据是完全相互独立的。", answer: true, explanation: "交叉验证的一个重要特点是将数据集划分为多个子集，其中每个子集在不同的轮次中充当测试集，而其他子集作为训练集。虽然每次划分时，测试集和训练集中的数据会有所重叠，但每个数据点在不同的轮次中都会作为测试集和训练集出现。这种方式确保了模型能够充分利用所有数据，并进行多次验证。然而，在每次验证过程中，测试集和训练集的数据来源不同，即测试集的数据在该轮次的训练中没有参与过，因此它们可以被认为是独立的。" },
            { id: 1367, text: "业务流程重组（BPR）只能通过研究和描述企业现有的业务流程来进行重新设计，没办法从零开始打造理想的业务流程。", answer: false, explanation: "业务流程重组可以通过研究和描述现有业务流程进行重新设计，也可以从零开始构建理想的业务流程，这两种方法通常结合使用。" },
            { id: 1368, text: "数据增强的主要目标是扩大训练数据集的规模，用于模型的训练任务，从而使模型在测试数据集上具备足够的泛化能力。", answer: true, explanation: "数据增强的主要目标是拓展训练数据集，用于训练任务模型，以便在测试数据集上实现足够的泛化能力。" },
            { id: 1369, text: "在 Pillow 模块中，convert () 方法可用于将图像转换为灰度图像。", answer: true, explanation: "Pillow模块中可以利用convert()方法将图像转化成灰度图像。" },
            { id: 1370, text: "文本语义向量化表示，是将自然语言编码为计算机可处理、且包含语义特征的向量的过程。", answer: true, explanation: "文本语义向量化表示是指将自然语言编码为计算机可处理的、蕴含语义特征的向量的过程，是机器处理文本数据和完成各种自然语言处理任务的基础，其性能的优劣直接影响下游任务的效果。" },
            { id: 1371, text: "所谓职业性，是指职业道德的内容和职业实践活动联系紧密，能体现出特定职业活动对从业人员行为的道德规范。", answer: true, explanation: "职业性：职业道德的内容与职业实践活动紧密相连，反映着特定职业活动对从业人员行为的道德要求。每一种职业道德都只能规范本行业从业人员的职业行为，在特定的职业范围内发挥作用。" },
            { id: 1372, text: "《中华人民共和国网络安全法》提及，网信部门及有关部门在履行网络安全保护职责时获取的信息，可用于其他方面。", answer: false, explanation: "《中华人民共和国网络安全法》第三十条规定，网信部门和有关部门在履行网络安全保护职责中获取的信息，只能用于维护网络安全的需要，不得用于其他用途。" },
            { id: 1373, text: "遵章守法的基本要求涵盖：遵守法律法规、遵循道德规范、不参与非法活动、滥用职权、保护客户权益、合规经营。", answer: false, explanation: "职业守则中的\"遵章守法\"基本要求指的是从业人员应该遵守法律法规和相关规定。包括遵守法律法规、遵循道德规范、不参与非法活动、保护客户权益、合规经营等方面。滥用职权对个人和公司均会造成负面影响，不属于遵章守法的基本要求。" },
            { id: 1374, text: "聚类分析是将具有相似性的数据元素归为同一类。", answer: true, explanation: "聚类分析是将相似的数据元素聚为一类，通常包括划分聚类、层次聚类、密度聚类、基于模型的聚类。" },
            { id: 1375, text: "支持向量机模型处理二分类问题时，会把问题转化为一个带约束的最小值问题。", answer: true, explanation: "支持向量机的目标是找到一个超平面，将数据集的两类样本分隔开，并且最大化这两类之间的间隔（即超平面到最近样本点的距离）。为了实现这个目标，SVM构造了一个带约束的最优化问题，通过约束条件确保每个数据点都被正确分类。" },
            { id: 1376, text: "人工神经网络算法处理信息，是依靠神经元之间的加权和激活函数计算来完成的。", answer: true, explanation: "神经网络通过神经元的加权和激活函数来处理输入信息。在训练过程中，网络通过调整连接权值并使用反向传播算法来优化结果，从而实现数据的分类、回归和预测任务。信息处理的核心是加权求和和激活函数计算。" },
            { id: 1377, text: "在关联分析中，支持度是用于评估变量间关联程度的指标。", answer: false, explanation: "支持度用于衡量关联规则在数据集中出现的频率。支持度越高，表示该关联规则在数据集中越普遍。" },
            { id: 1378, text: "当类别样本的分布存在严重不平衡的情况时，模型容易对某些类别产生过拟合，而忽略其他类别。", answer: true, explanation: "在样本不平衡的情况下，模型可能会偏向于预测样本数较多的类别，从而忽视少数类别，导致对多数类的过拟合。" },
            { id: 1379, text: "面对复杂的业务需求以及日益增多的 ETL 任务列表，调度的基础逻辑无需添加额外策略。", answer: false, explanation: "为了满足复杂的业务需求，以及不断膨胀的ETL任务列表，以及有限的资源，会在调度的基础逻辑上增加很多的策略，比如ETL任务的类别、按照优先级调度、运行开始时间要求、任务的资源限制等。" },
            { id: 1380, text: "在确立培训目标时，应从学习者的角度出发，清晰说明课程结束后学员预计需要掌握的知识、信息和能力等内容。", answer: true, explanation: "一个好的培训目标会通过指导员工进行精力、注意力的分配激励其为达到目标而进行战略开发来影响员工的行为方式，从而激发其高水平的培训绩效。在确立培训目标时就应注意，要从学习者的角度出发，明确说明预期课程结束后学员需要掌握哪些知识信息和能力等。" },
            { id: 1381, text: "在请求模式里，当应用程序等待输入数据时，并不会暂停自身的执行流程，它会持续运行，直到接收到输入数据才会停下。", answer: false, explanation: "请求模式要求应用程序暂停，直到输入设备提供所需的数据后才继续执行。" },
            { id: 1382, text: "召回率与精确率是一对具有相互权衡关系的度量指标。", answer: true, explanation: "召回率（Recall，又称查全率）与精确率（Precision）是一对具有权衡关系的度量。精确率是指分类正确的正样本个数占分类器判定为正样本的样本个数的比例；召回率是指分类正确的正样本个数占所有实际正样本的比例。在实际应用中，为了提高精确率，分类器可能会减少预测为正类的样本，从而减少误判的负类样本，但这样会漏掉一些正类样本，导致召回率下降。因此，精确率和召回率通常需要在某种程度上进行权衡。" },
            { id: 1383, text: "企业培训管理的初级阶段，是不断向新的高度发起冲击的阶段。", answer: false, explanation: "培训管理初级阶段是企业培训管理从无到有的阶段。" },
            { id: 1384, text: "GOMS 模型的局限性主要体现为：适用于描述较低层次的任务，无法体现错误、学习性、可接受度、疲劳度、专注度等特性，其预测结果更适合解释高度理想化的情况。", answer: true, explanation: "GOMS模型的局限性主要表现在适合描述较低层次的任务，无法描述错误、学习性、可接受度、疲劳度、专注度等特性，预测结果更适合解释高度理想化的情形。" },
            { id: 1385, text: "业务数据主要流程的开端是数据分析与建模，它的功能是直接为数据获取工作提供指引。", answer: false, explanation: "业务数据的主要流程为需求分析、数据获取、数据预处理、分析与建模、模型评价与优化和部署。" },
            { id: 1386, text: "劳动者若拒绝用人单位管理人员的违章指挥、强令冒险作业，会被视作违反劳动合同。", answer: false, explanation: "《中华人民共和国劳动合同法》第三十二条规定，劳动者拒绝用人单位管理人员违章指挥、强令冒险作业的，不视为违反劳动合同。" },
            { id: 1387, text: "对中级工作人员进行数据标注相关问题的指导，需要做到更深入、更专业，同时还要有清晰的针对性。", answer: true, explanation: "相比较指导初级工，指导中级工解决数据标注问题需要更加深入、专业和有针对性的指导，帮助他们掌握更高级的标注技能。" },
            { id: 1388, text: "特征选择的目的是从原始特征集合里筛选出与目标变量关联性最强的特征，以此提升模型性能并降低计算复杂度。", answer: true, explanation: "特征选择的核心目的是从原始特征集合中挑选出对目标变量最有用、最具预测能力的特征。通过去除冗余和无关的特征，特征选择能够提高模型的性能，减少模型的复杂度，进而提高计算效率。" },
            { id: 1389, text: "在层次任务分析法中，操作和其下属的操作之间存在着层级方面的联系。", answer: true, explanation: "层次任务分析法通过将任务分解为多个层次，其中操作（或任务）被逐级分解为下位操作，而下位操作则服务于更高层次的目标。操作和下位操作之间的关系确实是层级结构的关系。" },
            { id: 1390, text: "短时自相关函数可用于测定语音的相似特性。", answer: true, explanation: "短时自相关函数通过计算信号与其延迟版本之间的相关性来检测信号的周期性和相似性。在语音信号处理中，自相关函数常用于音高估计、语音活动检测等任务，能够有效捕捉信号的相似特性。" },
            { id: 1391, text: "图像数据处理是利用图像去噪、图形美化、图像数据减弱等手段，根据需求对图像数据进行处理的技术。", answer: false, explanation: "图像数据处理是利用图像数据去噪、图形分割、图像数据增强等手段根据需求对图像数据进行处理的技术。" },
            { id: 1392, text: "智慧城市是指通过各种技术手段，提高城市规划、智能化水平等，让城市生活更加美好。", answer: true, explanation: "智慧城市是指通过广泛采用物联网、云计算、移动互联网、大数据等新一代信息技术，提高城市规划、建设、管理、服务、生产、生活的自动化、智能化水平，使城市运转更高效、更敏捷、更低碳。" },
            { id: 1393, text: "并发性、共享性、虚拟性和异步性是现代操作系统都具备的特性，而虚拟性是其中最为重要的特征。", answer: false, explanation: "现代操作系统都具有并发性、共享性、虚拟性和异步性，其中并发性是操作系统最重要的特征，其他3个特性均基于并发性而存在。" },
            { id: 1394, text: "自然交互技术只包含手势识别和面部表情识别这两项内容。", answer: false, explanation: "自然交互技术包括手势识别、面部表情识别、眼动跟踪等。" },
            { id: 1395, text: "文本数据处理是一个涉及范围较广的主题，其流程形式相对固定，包含数据收集、清洗、转换、分析和可视化等环节。", answer: true, explanation: "文本数据处理是一个广泛的主题，其流程可以依据不同的需求和数据类型进行定制，涵盖了数据收集、清洗、转换、分析和可视化等方面。" },
            { id: 1396, text: "从训练误差和测试误差中，能够判断算法是否出现欠拟合。", answer: true, explanation: "欠拟合通常发生在模型过于简单，无法捕获数据中的复杂模式或结构时。在这种情况下，模型在训练集上的性能可能就不好（训练误差高），同时在测试集或未见过的数据上的性能也会很差（测试误差高）。如果模型在训练集和测试集上的表现都不好，通常意味着模型未能有效学习数据的规律，属于欠拟合的表现。" },
            { id: 1397, text: "可用性评估的关注点仅在于产品的功能与性能，而不涉及用户的需求和使用体验。", answer: false, explanation: "可用性评估的核心目标是确保产品不仅能实现预定的功能，还能够有效满足用户的需求，并提供良好的用户体验。在可用性评估中，设计人员会关注用户的易用性、交互流程、界面设计、以及产品是否能够满足用户的实际需求，功能和性能固然重要，但用户体验和需求是决定产品可用性的关键因素。" },
            { id: 1398, text: "均值滤波能用于去除脉冲噪声。", answer: false, explanation: "脉冲噪声是一种常见的噪声类型，其特点是像素值突然跳变到极值。对于脉冲噪声，中值滤波具有明显的优势。" },
            { id: 1399, text: "随机森林算法的分类结果由各决策树投票决定。", answer: true, explanation: "随机森林算法的分类结果是通过所有决策树的投票结果进行集成的。每棵决策树根据其训练集给出一个预测结果，最终通过投票决定最终的类别。" },
            { id: 1400, text: "运用计算机视觉、人脸识别、区块链、web3.0、物联网等新技术打造的新型无人零售店，实现了 “拿了就走” 等自助支付模式。", answer: false, explanation: "在计算机视觉、人脸识别、物联网等新技术的推动下，诞生了以AmazonGo为代表的新型无人零售店，通过“拿了就走”等自助支付手段，为消费者提供新的用户体验，也为商家节约人力成本。" },
            { id: 1401, text: "特征选择是去掉原有数据，进而生成新的变量。", answer: false, explanation: "特征选择是从现有的特征集合中挑选出最相关、最有用的特征，目的是提高模型的性能，减少冗余特征，并避免过拟合。特征选择并不涉及生成新的变量，这通常是特征构造或特征工程的任务。" },
            { id: 1402, text: "支持向量机算法通过探寻一个超平面，以最大程度分隔两类样本，从而解决二分类问题。", answer: true, explanation: "支持向量机（SVM）的工作原理是在高维空间中寻找一个超平面，使得该超平面可以最大化地将不同类别的样本分隔开。解决二分类问题时，支持向量机算法通过寻找一个超平面，将两类样本最大化地分隔开。" },
            { id: 1403, text: "网格搜索会对 “网格” 中的每个超参点实施穷举搜索。", answer: true, explanation: "网格搜索是一种常见的超参数优化方法，它通过穷举在预定义的超参数空间（即“网格”）中每一个超参数组合，评估模型性能，最终选取表现最好的超参数组合。该方法的特点是完全遍历所有可能的超参数组合，因此常常计算量较大，但能保证找到最优的超参数配置。" },
            { id: 1404, text: "文本数据处理是一个涵盖内容广泛的主题，其流程可根据不同需求和数据类型进行定制，包含数据收集、清洗、转换、分析和可视化等环节。", answer: true, explanation: "文本数据处理是一个广泛的主题，其流程可以依据不同的需求和数据类型进行定制，涵盖了数据收集、清洗、转换、分析和可视化等方面。" },
            { id: 1405, text: "操作系统是对软件的抽象，用户借助操作系统来操控计算机。", answer: false, explanation: "操作系统是硬件的抽象，用户通过操作系统来控制计算机硬件和计算机资源的分配。" },
            { id: 1406, text: "借助 5G 网络高效率、广连接的特性，把车、路、人等要素连接起来，形成能够随时通信、实时监控、即时决策的智慧交通网络。", answer: false, explanation: "5G作为新一代通信技术，对智慧交通的发展起到强大的推动作用。5G网络依托高速率、大连接的特性，连接车、路、人、云等对象，形成一张可随时通信、实时监控、即时决策的智慧交通网络。" },
            { id: 1407, text: "NoSQL 数据库遵循 BASE 模型，所以为了追求高可用性而完全放弃了数据一致性。", answer: false, explanation: "BASE模型并不完全放弃一致性，而是通过最终一致性在可用性与一致性之间权衡。" },
            { id: 1408, text: "数据库管理系统是专门用于对数据进行管理和维护的系统软件。", answer: true, explanation: "数据库管理系统是一个专门用于实现对数据进行管理和维护的系统软件。" },
            { id: 1409, text: "交叉验证法最后要计算模型在测试集上性能的平均值。", answer: true, explanation: "交叉验证法是一种模型评估方法，通常将数据集划分为K个子集。在每次迭代中，选择一个子集作为测试集，其他子集作为训练集进行模型训练和评估。最终，交叉验证法通过对所有K次测试集结果的平均来评估模型的总体性能，从而减少模型评估的方差。" },
            { id: 1410, text: "手势交互指的是通过具有符号意义的手势，来实现信息交流和对计算机进行控制的交互技术。", answer: true, explanation: "手势交互是指人通过手部动作表达特定的含义和交互意图，通过具有符号功能的手势来进行信息交流和控制计算机的交互技术。" },
            { id: 1411, text: "业务流程优化不能脱离实际独自进行，要结合企业的现状，比如管理基础、资源能力等进行科学分析，亲身体验企业现有的业务流程，并在此基础上对流程加以优化。", answer: true, explanation: "业务流程优化不能闭门造车，要针对企业现状，如管理基础、资源能力等进行科学分析，对企业现有的业务流程进行亲身体验，以此为基础对流程进行优化。" },
            { id: 1412, text: "漏斗分析的核心目的是跟踪用户在不同行为阶段的转化率情况。", answer: true, explanation: "从业务流程起点开始到最后目标完成的每个环节都会有用户流失，因此需要一种分析方法来衡量业务流程每一步的转化效率，漏斗分析方法就是这样的分析方法。" },
            { id: 1413, text: "SWOT 模型从优势、劣势、因素、结果这 4 个角度对企业现状展开分析，并对未来进行预测。", answer: false, explanation: "SWOT模型从优势、劣势、机会、威胁4个方面对企业的现状进行分析，同时对未来加以预测。" },
            { id: 1414, text: "汇编作品的著作权由汇编人享有，不过在运用这项权利时，不能侵犯原作品的著作权。", answer: true, explanation: "《中华人民共和国著作权法》第十五条规定，汇编若干作品、作品的片段或者不构成作品的数据或者其他材料，对其内容的选择或者编排体现独创性的作品，为汇编作品，其著作权由汇编人享有，但行使著作权时，不得侵犯原作品的著作权。" },
            { id: 1415, text: "文本向量化是与文本相关的机器学习中必不可少的前置操作。", answer: true, explanation: "文本向量化是与文本有关的机器学习必要的前置操作，让机器理解自然语言。" },
            { id: 1416, text: "某企业想要掌握自身财务状况的变动情况，于是对比不同时期的资产负债率指标，利用趋势分析法来评判企业的财务管理水平以及未来资金的运用方向。", answer: true, explanation: "趋势分析法用于对比不同时期同一指标，如资产负债率，以此判断企业管理水平和未来方向。" },
            { id: 1417, text: "HBase 属于列族数据库，是 NoSQL 的一种类型。", answer: true, explanation: "HBase是典型的列族数据库，通过列簇组织数据，适合海量数据的分布式存储和高并发读写场景，属于NoSQL的核心分类之一。" },
            { id: 1418, text: "对关联规则的相关性进行度量时，支持度和置信度是常用的指标。", answer: true, explanation: "关联规则挖掘是指从一个大型的数据集中发现有趣的关联或相关关系，即从数据集中识别出频繁出现的属性值集，也称为频繁项集，然后利用这些频繁项集创建描述关联关系规则的过程。一般用支持度和可信度两个阈值度量关联规则的相关性，还不断引入兴趣度、相关性等参数，使所挖掘的规则更符合需求。" },
            { id: 1419, text: "针对技术人员的培训，只需着重进行技术知识与技能方面的培养，其他方面的培训无关紧要。", answer: false, explanation: "根据技术人员的特点，对技术人员培训的主要项目有：计算机编程，程序和网络维护、操作，新设备的维护、维修与操作，安全常识，产品知识，全面质量管理，目标管理，管理信息系统，市场营销，财务管理，新产品研制，材料替代，生产管理，工业工程，品质工程等。对技术人员的培训是多方面的，也就是说，企业所需要的技术人员应该具有较全面的能力和素质。" },
            { id: 1420, text: "LOTOS 由两部分组成，第一部分以进程代数 CCS 为基础，用于描述进程的演化结果；第二部分以抽象数据类型语言 ACT-ONE 为基础，用于描述数据结构和值表达式。", answer: false, explanation: "LOTOS包括两个部分，第一部分基于进程代数CCS，描述进程的行为和相互作用，第二部分基于抽象数据类型语言ACT-ONE，描述数据结构和值表达式。" },
            { id: 1421, text: "中文分词模型的主要功能是将连贯的汉字序列拆分成单个的汉字。", answer: false, explanation: "中文分话模型包括基于规则匹配的分词模型和基于统计学的分词模型，将原来的中文文字序列中切分出词语。" },
            { id: 1422, text: "依据规模，也就是存储容量、运算速度等指标，计算机可分为七大类，分别是巨型机、大型机、中型机、小型机、微型机、工作站和服务器。", answer: true, explanation: "计算机按规模即存储容量、运算速度等可分为七大类：巨型机、大型机、中型机、小型机、微型机、工作站和服务器。" },
            { id: 1423, text: "5W2H 模型又称 “七问分析法”，它以 5 个以 W 开头的英文单词和 2 个以 H 开头的英文单词为引导进行提问，通过提问来探寻答案。", answer: true, explanation: "5W2H模型又叫“七问分析法”，即以5个以W开头的英文单词和2个以H开头的英文单词为引子进行提问，从提问中发现答案的分析方法。" },
            { id: 1424, text: "在关联分析中，那些同时达到最小支持度和最小置信度标准的规则，被称为强规则。", answer: true, explanation: "最小支持度是用户或专家定义的衡量支持度的一个阈值，表示项目集在统计意义上的最低重要性;最小置信度是用户或专家定义的衡量置信度的一个阈值，表示关联规则的最低可靠性。同时满足最小支持度阈值和最小置信度阈值的规则称作强规则。" },
            { id: 1425, text: "图像识别、语音处理等任务能够通过人工神经网络来完成。", answer: true, explanation: "人工神经网络在信号处理和模式识别中有广泛应用。例如，神经网络可以用来进行图像识别、语音处理、时间序列预测等任务。通过学习输入数据的模式和特征，神经网络能够从中提取有效信息，并做出预测或分类。" },
            { id: 1426, text: "仅使用一次留出法得到的估计结果是足够稳定可靠的。", answer: false, explanation: "单次使用留出法时，训练集和测试集的划分是随机的，且通常只进行一次。这意味着模型的评估结果可能会受单次数据划分的影响，从而导致结果的不稳定性。例如，某次划分可能恰好选取了某些具有特殊性质的数据，导致评估结果偏高或偏低。" },
            { id: 1427, text: "某旅游公司打算分析游客的消费状况，仅依据旅游消费金额这一维度进行分类，为消费金额高的游客提供豪华游服务，这种做法被认为是对象限分析法的合理运用。", answer: false, explanation: "象限分析法需要两个或多个维度来划分象限，而此处仅使用一个维度，不符合象限分析法的运用方式。" },
            { id: 1428, text: "人机行为模型的交互流程主要由感知、识别与理解、决策与生成、执行及反馈这几个部分组成。", answer: true, explanation: "人机行为模型的交互过程主要包括感知、识别和理解、决策和生成、执行和反馈。" },
            { id: 1429, text: "在数据清洗工作里，处理缺失值是唯一需要攻克的难题。", answer: false, explanation: "在众多数据中总是存在着许多脏数据，即不完整、不规范、不准确的数据，而数据清洗就是指彻底清除脏数据，包括检查数据一致性，处理无效值、异常值和缺失值等，从而提高数据质量，而不单是处理缺失值。" },
            { id: 1430, text: "层次聚类方法能够通过计算不同类别数据点之间的相似度，构建出一棵具有层次的嵌套聚类树。", answer: true, explanation: "层次聚类方法的可以通过计算不同类别数据点间的相似度来创建一棵有层次的嵌套聚类树。" },
            { id: 1431, text: "RFM 模型是一种依据客户行为进行细分的方式，它以相对静态的形式呈现出客户的完整形象，为开展个性化沟通与服务提供了参考。", answer: false, explanation: "RFM模型是一种基于客户行为细分的方法，RFM模型较为动态地显示了一个客户的全部轮廓，这对个性化的沟通和服务提供了依据。" },
            { id: 1432, text: "分类模型的评估指标包含 MSE 和 RMSE。", answer: false, explanation: "评估指标可以直观反映模型分类或回归效果的优劣。常用的分类模型评估指标有精确率、准确率、召回率F1值、AUC和K-S。常用的回归模型评估指标有MSE、RMSE、MAE和MAPE。" }
        ];

        // ----- 状态管理 -----
        let currentUser = null;               // 当前登录用户
        let currentQuestions = [];            // 当前试卷题目 (子集)
        let userAnswers = {};                // { questionId: 'true'/'false' }
        let submitted = false;               // 是否已交卷
        let wrongBook = [];                 // 错题ID列表 (持久化)
        const STORAGE_KEY = 'judge_wrongbook';

        // DOM 引用
        const loginArea = document.getElementById('loginArea');
        const testArea = document.getElementById('testArea');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginError = document.getElementById('loginError');
        const userDisplay = document.getElementById('userDisplay');
        const questionCountInput = document.getElementById('questionCountInput');
        const generateBtn = document.getElementById('generateBtn');
        const resetBtn = document.getElementById('resetBtn');
        const questionList = document.getElementById('questionList');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const submitBtn = document.getElementById('submitBtn');
        const showWrongBtn = document.getElementById('showWrongBtn');
        const clearWrongBtn = document.getElementById('clearWrongBtn');
        const statusInfo = document.getElementById('statusInfo');

        // ----- 辅助函数 -----
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 从题库随机抽取 n 题
        function pickRandomQuestions(n) {
            const shuffled = shuffleArray([...rawQuestions]);
            return shuffled.slice(0, n);
        }

        // 保存错题本到 localStorage
        function saveWrongBook() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(wrongBook));
        }

        // 加载错题本
        function loadWrongBook() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try { wrongBook = JSON.parse(stored); } catch(e){ wrongBook = []; }
            } else {
                wrongBook = [];
            }
        }

        // 重置状态 (不清除错题本)
        function resetExamState() {
            currentQuestions = [];
            userAnswers = {};
            submitted = false;
            renderQuestions();
            updateScore();
            statusInfo.textContent = '已重置';
        }

        // 生成试卷
        function generatePaper(count) {
            if (!currentUser) return;
            if (count < 1) count = 1;
            if (count > rawQuestions.length) count = rawQuestions.length;
            const picked = pickRandomQuestions(count);
            currentQuestions = picked;
            userAnswers = {};
            submitted = false;
            renderQuestions();
            updateScore();
            statusInfo.textContent = `已生成 ${picked.length} 题`;
        }

        // 渲染题目
        function renderQuestions() {
            if (!currentQuestions.length) {
                questionList.innerHTML = `<div style="padding:30px;text-align:center;color:#6f8ba5;">点击「生成试卷」开始测试</div>`;
                return;
            }
            let html = '';
            currentQuestions.forEach((q, idx) => {
                const qid = q.id;
                const selected = userAnswers[qid] || null;
                const isCorrect = submitted ? (selected === (q.answer ? 'true' : 'false')) : null;
                let extraClass = '';
                if (submitted && isCorrect !== null) {
                    extraClass = isCorrect ? 'correct' : 'wrong';
                }
                const correctText = q.answer ? '正确' : '错误';
                const answerBadge = submitted ? `<span class="answer-badge" style="background:${isCorrect ? '#1f8b4c' : '#c52a3a'};">${isCorrect ? '✓' : '✗'} 正确答案: ${correctText}</span>` : '';

                html += `<div class="question-item ${extraClass}" data-qid="${qid}">
                    <div class="q-text">
                        <span class="q-index">${idx+1}.</span>
                        <span>${q.text}</span>
                    </div>
                    <div class="options">
                        <label><input type="radio" name="q_${qid}" value="true" ${selected === 'true' ? 'checked' : ''} ${submitted ? 'disabled' : ''}> 正确</label>
                        <label><input type="radio" name="q_${qid}" value="false" ${selected === 'false' ? 'checked' : ''} ${submitted ? 'disabled' : ''}> 错误</label>
                    </div>
                    <div class="explanation" style="display: ${submitted ? 'block' : 'none'};">
                        ${answerBadge}
                        <span>${q.explanation}</span>
                    </div>
                </div>`;
            });
            questionList.innerHTML = html;

            // 绑定事件 (未交卷时)
            if (!submitted) {
                document.querySelectorAll('.question-item input[type="radio"]').forEach(radio => {
                    radio.addEventListener('change', function(e) {
                        const qid = parseInt(this.closest('.question-item').dataset.qid);
                        const val = this.value; // 'true' or 'false'
                        userAnswers[qid] = val;
                        // 实时更新分数显示
                        updateScore();
                        statusInfo.textContent = '已选答案';
                    });
                });
            }
        }

        // 计算当前得分 (已答且正确)
        function calcScore() {
            let correct = 0;
            let total = currentQuestions.length;
            if (!total) return { correct, total };
            currentQuestions.forEach(q => {
                const selected = userAnswers[q.id];
                if (selected !== undefined && selected !== null) {
                    if ((selected === 'true') === q.answer) correct++;
                }
            });
